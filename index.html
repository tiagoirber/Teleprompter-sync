<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TelePrompter</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--text:#fff;--dim:rgba(255,255,255,0.18);
  --muted:rgba(255,255,255,0.45);--faint:rgba(255,255,255,0.12);
  --border:rgba(255,255,255,0.08);--card:#0d0d0d;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#3b82f6;
}
html,body{height:100%;overflow:hidden}
body{background:#111;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .2s}
.screen.hidden{opacity:0;pointer-events:none}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.18);background:transparent;color:#fff;transition:background .15s,border-color .15s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.3)}
.btn:active{transform:scale(.97)}
.btn.primary{background:#fff;color:#000;border-color:#fff}
.btn.primary:hover{background:rgba(255,255,255,0.88)}
.btn.icon{padding:7px;border-radius:6px}
.btn.danger{border-color:rgba(239,68,68,.4);color:#ef4444}
.btn.danger:hover{background:rgba(239,68,68,.1)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

/* EDITOR */
#editor{background:#111}
.editor-header{display:flex;align-items:center;justify-content:space-between;height:52px;padding:0 16px;border-bottom:1px solid rgba(255,255,255,0.07);background:#0d0d0d;flex-shrink:0;gap:8px}
.editor-logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#fff;white-space:nowrap}
.logo-mark{width:26px;height:26px;border:1.5px solid rgba(255,255,255,0.5);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:5px}
.logo-mark span{display:block;height:1.5px;background:#fff;border-radius:1px}
.logo-mark span:nth-child(1){width:12px}
.logo-mark span:nth-child(2){width:8px;opacity:.5}
.logo-mark span:nth-child(3){width:10px;opacity:.25}
.settings-row{display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.07);background:#0d0d0d;flex-shrink:0}
.setting{display:flex;align-items:center;gap:6px}
.setting label{font-size:11px;color:var(--muted);white-space:nowrap}
.setting input[type=range]{width:72px;accent-color:#fff;cursor:pointer}
.setting select{background:#1a1a1a;border:1px solid rgba(255,255,255,0.12);color:#fff;font-size:12px;padding:3px 8px;border-radius:5px;cursor:pointer;outline:none}
.setting-val{font-size:11px;color:#fff;min-width:26px;text-align:right}
.toggle-btn{font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;border:1px solid rgba(255,255,255,0.18);background:transparent;color:var(--muted);transition:all .15s}
.toggle-btn.on{background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.3)}
.editor-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;min-width:220px;border-right:1px solid rgba(255,255,255,0.07);background:#0a0a0a;display:flex;flex-direction:column}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.sidebar-head span{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.script-list{flex:1;overflow-y:auto;padding:4px 0}
.script-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .12s,border-color .12s;gap:6px}
.script-item:hover{background:rgba(255,255,255,0.04)}
.script-item.active{border-left-color:#fff;background:rgba(255,255,255,0.05)}
.script-item-title{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#ddd}
.script-item.active .script-item-title{color:#fff}
.script-item-del{opacity:0;font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 5px;border-radius:4px;flex-shrink:0;line-height:1}
.script-item:hover .script-item-del{opacity:1}
.script-item-del:hover{color:#ef4444;background:rgba(239,68,68,.1)}
.sidebar-foot{padding:10px 12px;border-top:1px solid rgba(255,255,255,0.07);font-size:11px;color:var(--muted)}
.editor-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.title-bar{padding:12px 20px 0;flex-shrink:0}
.title-input{width:100%;background:transparent;border:none;outline:none;font-size:20px;font-weight:700;color:#fff;padding:4px 0}
.title-input::placeholder{color:rgba(255,255,255,0.2)}
.textarea-wrap{flex:1;padding:8px 20px 0;overflow:hidden;display:flex}
textarea{flex:1;width:100%;background:transparent;border:none;outline:none;resize:none;font-size:15px;line-height:1.75;color:#ccc;font-family:inherit}
textarea::placeholder{color:rgba(255,255,255,0.18)}
.status-bar{display:flex;align-items:center;gap:16px;padding:8px 20px;border-top:1px solid rgba(255,255,255,0.07);font-size:12px;color:var(--muted);flex-shrink:0}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.save-dot.saving{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;padding:20px;transition:opacity .25s}
.modal-overlay.hidden{opacity:0;pointer-events:none}
.modal{width:100%;max-width:580px;max-height:92vh;overflow-y:auto;background:#0d0d0d;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;display:flex;flex-direction:column;gap:20px}
.modal h2{font-size:19px;font-weight:700;color:#fff}
.modal p{font-size:13px;color:var(--muted);line-height:1.65}
.cal-steps{display:flex;gap:6px;align-items:center}
.cal-step-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.15);transition:background .2s}
.cal-step-dot.done{background:var(--green)}
.cal-step-dot.active{background:#fff}
.cal-step-label{font-size:11px;color:var(--muted);margin-left:6px}
.sentence-card{background:#161616;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:20px}
.sentence-text{font-size:16px;font-weight:600;color:#fff;line-height:1.6;text-align:center;min-height:52px;display:flex;align-items:center;justify-content:center}
.sentence-num{font-size:11px;color:var(--muted);text-align:center;margin-bottom:10px;letter-spacing:.08em;text-transform:uppercase}
.listen-indicator{display:flex;align-items:center;justify-content:center;gap:3px;height:36px;margin:6px 0}
.wave-bar{width:3px;border-radius:2px;background:rgba(255,255,255,0.15);height:4px}
.listen-indicator.active .wave-bar{background:var(--green)}
.listen-indicator.active .wave-bar:nth-child(1){animation:wave 1.1s ease infinite 0s}
.listen-indicator.active .wave-bar:nth-child(2){animation:wave 1.1s ease infinite .15s}
.listen-indicator.active .wave-bar:nth-child(3){animation:wave 1.1s ease infinite .07s}
.listen-indicator.active .wave-bar:nth-child(4){animation:wave 1.1s ease infinite .22s}
.listen-indicator.active .wave-bar:nth-child(5){animation:wave 1.1s ease infinite .04s}
.listen-indicator.active .wave-bar:nth-child(6){animation:wave 1.1s ease infinite .18s}
.listen-indicator.active .wave-bar:nth-child(7){animation:wave 1.1s ease infinite .11s}
@keyframes wave{0%,100%{height:4px}50%{height:26px}}
.transcript-box{background:#1a1a1a;border:1px solid rgba(255,255,255,0.07);border-radius:8px;padding:10px 14px;min-height:44px;font-size:13px;color:rgba(255,255,255,0.7);line-height:1.6;font-style:italic}
.score-row{display:flex;align-items:center;gap:10px;margin-top:4px}
.score-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width .4s,background .4s}
.score-val{font-size:12px;font-weight:600;min-width:34px;text-align:right}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.result-card{background:#161616;border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px}
.rc-label{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em}
.rc-val{font-size:22px;font-weight:700;color:#fff}
.rc-sub{font-size:11px;color:var(--muted);margin-top:4px}
.cal-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px}
.cal-badge.good{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.cal-badge.ok{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--amber)}
.cal-badge.bad{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.cal-profile-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.cal-profile-row:last-child{border-bottom:none}
.cal-profile-row span:first-child{color:var(--muted)}
.cal-profile-row span:last-child{color:#fff;font-weight:500}
/* name input inside modal */
.name-input{width:100%;background:#1a1a1a;border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:9px 14px;font-size:14px;color:#fff;outline:none;transition:border-color .15s}
.name-input:focus{border-color:rgba(255,255,255,0.4)}
.name-input::placeholder{color:rgba(255,255,255,0.25)}

/* Voice profiles dropdown */
.cal-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.12);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;background:transparent;position:relative}
.cal-status:hover{border-color:rgba(255,255,255,.25);color:#fff}
.cal-status.calibrated{border-color:rgba(34,197,94,.3);color:var(--green);background:rgba(34,197,94,.08)}
.cal-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* Profile list in modal */
.profile-list{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto}
.profile-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#161616;border:1px solid rgba(255,255,255,0.07);border-radius:9px;cursor:pointer;transition:border-color .15s,background .15s}
.profile-item:hover{background:#1d1d1d;border-color:rgba(255,255,255,0.15)}
.profile-item.active-profile{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06)}
.profile-info{display:flex;flex-direction:column;gap:2px}
.profile-name{font-size:13px;font-weight:600;color:#fff}
.profile-meta{font-size:11px;color:var(--muted)}
.profile-actions{display:flex;gap:6px;align-items:center}

/* TELEPROMPTER */
#teleprompter{background:#000;cursor:none}
#teleprompter.light{background:#fff}
#teleprompter.hc{background:#000}
#teleprompter.cursor-visible{cursor:default}
.tp-scroll{position:absolute;inset:0;overflow-y:scroll;scrollbar-width:none}
.tp-scroll::-webkit-scrollbar{display:none}
.tp-content{padding:45vh 0;display:flex;flex-direction:column;align-items:center}
.tp-line{text-align:center;cursor:pointer;transition:opacity .25s,transform .2s;padding:2px 0}
.tp-spacer{height:1em}
.tp-guide{position:fixed;left:0;right:0;height:1px;background:rgba(255,255,255,0.07);pointer-events:none;z-index:5}
#teleprompter.light .tp-guide{background:rgba(0,0,0,0.07)}
.tp-rail{position:fixed;right:0;top:0;bottom:0;width:3px;z-index:5;pointer-events:none}
.tp-rail-bg{position:absolute;inset:0;background:rgba(255,255,255,0.05)}
.tp-rail-fill{position:absolute;top:0;left:0;right:0;background:rgba(255,255,255,0.35);transition:height .3s}
.tp-rail-marker{position:absolute;left:0;right:0;height:3px;background:#fff;transition:top .3s}
#teleprompter.light .tp-rail-bg{background:rgba(0,0,0,0.05)}
#teleprompter.light .tp-rail-fill{background:rgba(0,0,0,.25)}
#teleprompter.light .tp-rail-marker{background:#000}
#teleprompter.hc .tp-rail-marker{background:#ffe600}
#teleprompter.hc .tp-rail-fill{background:rgba(255,230,0,.3)}
.tp-fade-top,.tp-fade-bot{position:fixed;left:0;right:0;height:120px;pointer-events:none;z-index:4}
.tp-fade-top{top:0;background:linear-gradient(to bottom,#000 0%,transparent 100%)}
.tp-fade-bot{bottom:0;background:linear-gradient(to top,#000 0%,transparent 100%)}
#teleprompter.light .tp-fade-top{background:linear-gradient(to bottom,#fff 0%,transparent 100%)}
#teleprompter.light .tp-fade-bot{background:linear-gradient(to top,#fff 0%,transparent 100%)}
.tp-countdown{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.92);transition:opacity .3s}
.tp-countdown.hidden{opacity:0;pointer-events:none}
.cd-num{font-size:clamp(80px,20vw,180px);font-weight:800;line-height:1;animation:cd-pop .35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes cd-pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.cd-label{margin-top:16px;font-size:13px;letter-spacing:.25em;text-transform:uppercase;opacity:.4}
.tp-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;transition:opacity .4s,transform .4s}
.tp-bar.hidden{opacity:0;pointer-events:none;transform:translateY(8px)}
.tp-progress{height:1px;background:rgba(255,255,255,0.1)}
.tp-progress-fill{height:100%;background:rgba(255,255,255,.5);transition:width .5s}
.tp-controls{display:flex;align-items:center;gap:6px;padding:10px 16px 12px;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.07);flex-wrap:wrap}
#teleprompter.light .tp-progress{background:rgba(0,0,0,.1)}
#teleprompter.light .tp-progress-fill{background:rgba(0,0,0,.4)}
#teleprompter.light .tp-controls{background:rgba(255,255,255,.9);border-top-color:rgba(0,0,0,.08)}
#teleprompter.light .tp-controls .btn{color:#000;border-color:rgba(0,0,0,.18)}
#teleprompter.light .tp-controls .btn:hover{background:rgba(0,0,0,.07)}
#teleprompter.light .tp-controls .ctrl-info{color:rgba(0,0,0,.45)}
#teleprompter.hc .tp-controls{background:rgba(0,0,0,.95);border-top-color:rgba(255,230,0,.15)}
.tp-play-btn{width:48px;height:48px;border-radius:50%;background:#fff;color:#000;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:opacity .15s,transform .1s;flex-shrink:0}
.tp-play-btn:hover{opacity:.88}
.tp-play-btn:active{transform:scale(.94)}
#teleprompter.light .tp-play-btn{background:#000;color:#fff}
#teleprompter.hc .tp-play-btn{background:#ffe600;color:#000}
.speed-display{display:flex;flex-direction:column;align-items:center;gap:2px}
.speed-bars{display:flex;gap:2px;align-items:flex-end;height:12px}
.speed-bar-seg{width:3px;border-radius:1px;transition:background .15s}
.speed-label{font-size:10px;color:var(--muted)}
.ctrl-sep{width:1px;height:20px;background:rgba(255,255,255,.1);margin:0 2px;flex-shrink:0}
#teleprompter.light .ctrl-sep{background:rgba(0,0,0,.1)}
.ctrl-info{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
.mic-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
.mic-btn{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:all .2s;background:transparent;font-size:16px}
.mic-btn.idle{border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.4)}
.mic-btn.idle:hover{border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.7)}
.mic-btn.listening{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1);color:#22c55e;animation:mic-pulse 2s ease infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}50%{box-shadow:0 0 0 5px rgba(34,197,94,.15)}}
.mic-btn.error{border-color:rgba(239,68,68,.3);color:#ef4444}
.mic-btn.unsupported{opacity:.3;cursor:not-allowed}
.mic-label{font-size:9px;letter-spacing:.05em;font-weight:600}
.mic-label.on{color:#22c55e}
.mic-label.off{color:var(--muted)}
.mic-score{position:absolute;bottom:-6px;left:0;right:0;height:2px;border-radius:1px;overflow:hidden;background:rgba(255,255,255,.08)}
.mic-score-fill{height:100%;border-radius:1px;transition:width .3s,background .3s}
.conf-toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:40;padding:8px 16px;border-radius:100px;background:rgba(0,0,0,.9);border:1px solid rgba(255,160,0,.3);font-size:12px;color:rgba(255,200,0,.9);display:flex;align-items:center;gap:8px;transition:opacity .3s;white-space:nowrap;backdrop-filter:blur(8px)}
.conf-toast.hidden{opacity:0;pointer-events:none}
.tp-hint{position:fixed;bottom:0;left:0;right:0;z-index:19;text-align:center;padding:6px;font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.05em;background:rgba(0,0,0,.88);transition:opacity .4s}
.tp-hint.hidden{opacity:0;pointer-events:none}
#teleprompter.light .tp-hint{background:rgba(255,255,255,.9);color:rgba(0,0,0,.25)}

/* Sync mode indicator in TP */
.sync-mode-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;padding:3px 9px;border-radius:100px;
  letter-spacing:.04em;
}
.sync-mode-badge.voice{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#22c55e}
.sync-mode-badge.auto{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5)}
</style>
</head>
<body>

<!-- EDITOR -->
<div id="editor" class="screen">
  <div class="editor-header">
    <div class="editor-logo">
      <div class="logo-mark"><span></span><span></span><span></span></div>
      TelePrompter
    </div>
    <div class="settings-row" style="flex:1;border:none;padding:0 12px;background:transparent">
      <div class="setting"><label>Fonte</label><input type="range" id="s-font" min="28" max="88" step="2" value="52"><span class="setting-val" id="s-font-v">52</span></div>
      <div class="setting"><label>Vel.</label><input type="range" id="s-speed" min="1" max="10" step="1" value="3"><span class="setting-val" id="s-speed-v">3</span></div>
      <div class="setting"><label>Espaço</label><input type="range" id="s-lh" min="1.2" max="3" step="0.1" value="1.9"><span class="setting-val" id="s-lh-v">1.9</span></div>
      <div class="setting"><label>Largura</label><input type="range" id="s-width" min="40" max="100" step="2" value="72"><span class="setting-val" id="s-width-v">72%</span></div>
      <div class="setting"><label>Foco</label><select id="s-focus"><option value="0">Todas</option><option value="3">3 linhas</option><option value="5">5 linhas</option><option value="7">7 linhas</option></select></div>
      <div class="setting"><label>Fundo</label><input type="color" id="s-bg" value="#000000" style="width:32px;height:24px;border:1px solid rgba(255,255,255,.2);border-radius:4px;cursor:pointer;padding:1px;background:transparent"></div>
      <div class="setting"><label>Texto</label><input type="color" id="s-fg" value="#ffffff" style="width:32px;height:24px;border:1px solid rgba(255,255,255,.2);border-radius:4px;cursor:pointer;padding:1px;background:transparent"></div>
      <div class="setting"><label>Espelhar</label><button class="toggle-btn" id="s-mirror">OFF</button></div>
      <div class="setting"><label>Contagem</label><select id="s-cd"><option value="0">Off</option><option value="3" selected>3s</option><option value="5">5s</option></select></div>
      <div class="setting"><label>Idioma</label><select id="s-lang"><option value="pt-BR">PT-BR</option><option value="en-US">EN-US</option><option value="es-ES">ES</option></select></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
      <button class="cal-status" id="cal-status-btn" onclick="openVoiceManager()">
        <span class="cal-dot"></span>
        <span id="cal-status-label">Calibrar voz</span>
      </button>
      <button class="btn primary" onclick="openTeleprompter()">▶ Iniciar</button>
    </div>
  </div>
  <div class="editor-body">
    <div class="sidebar" id="sidebar">

<script>
// ══════════════════════════════════
// STORAGE
// ══════════════════════════════════
const K={scripts:'tp:scripts',active:'tp:active',settings:'tp:settings',profiles:'tp:voice_profiles',activeProfile:'tp:active_profile'}
const load=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let scripts  = load(K.scripts,[{id:'demo',title:'Roteiro de Exemplo',content:'Bem-vindo ao TelePrompter.\n\nEste é um roteiro de demonstração para você testar todas as funcionalidades.\n\nA rolagem automática por voz detecta o que você está falando e sincroniza o texto em tempo real.\n\nMesmo se você pausar, improvisar ou pular um trecho, o sistema se reposiciona automaticamente.\n\nUse as teclas de seta para navegar manualmente. A barra de espaço pausa e retoma.\n\nConfigure fonte, velocidade e espaçamento conforme sua preferência.\n\nAtive o espelhamento se estiver usando um vidro refletor.\n\nBoa gravação!',createdAt:Date.now(),updatedAt:Date.now()}])
let activeId = load(K.active,scripts[0]?.id)
let settings = load(K.settings,{fontSize:52,lineHeight:1.9,speed:3,blockWidth:72,focusLines:0,bgColor:'#000000',fgColor:'#ffffff',mirrored:false,countdown:3,lang:'pt-BR'})

// Voice profiles — each has id, name, calibration data
let voiceProfiles    = load(K.profiles,[])
let activeProfileId  = load(K.activeProfile,null)

function getActiveProfile(){return voiceProfiles.find(p=>p.id===activeProfileId)||null}
function saveProfiles(){save(K.profiles,voiceProfiles);save(K.activeProfile,activeProfileId)}

// Derived calibration — from active profile or defaults
function getCal(){
  const p=getActiveProfile()
  if(p)return p
  return{done:false,thresholdScale:1,confirmNeeded:2,fillers:[],wpm:130}
}

const genId=()=>Date.now()+'-'+Math.random().toString(36).slice(2,7)
const getActive=()=>scripts.find(s=>s.id===activeId)||scripts[0]
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
const persistAll=()=>{save(K.scripts,scripts);save(K.active,activeId);save(K.settings,settings)}

// ══════════════════════════════════
// TEXT PROCESSING
// ══════════════════════════════════
const FILLERS_BASE=new Set(['então','tipo','assim','né','aí','ahn','hmm','bom','ok','tá','uh','um','like','so','well','right','basicamente','literalmente'])

function normalize(t){
  const cal=getCal()
  const extra=new Set(cal.fillers||[])
  return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^\w\s]/g,' ').split(/\s+/)
    .filter(w=>w.length>0&&!FILLERS_BASE.has(w)&&!extra.has(w))
    .join(' ').trim()
}

function bigrams(t){
  const w=t.split(' ').filter(Boolean)
  if(w.length<2)return w
  const r=[];for(let i=0;i<w.length-1;i++)r.push(w[i]+' '+w[i+1])
  return r
}

function diceFromSets(a,b){
  if(!a.size||!b.size)return 0
  let inter=0;const[sm,lg]=a.size<=b.size?[a,b]:[b,a]
  for(const bg of sm)if(lg.has(bg))inter++
  return(2*inter)/(a.size+b.size)
}

function adaptiveThreshold(wc){
  const cal=getCal()
  const scale=cal.done?cal.thresholdScale:1
  const base=wc<=2?0.65:wc<=4?0.42:wc<=6?0.32:0.24
  return Math.max(0.12,base*scale)
}

// ══════════════════════════════════
// VOICE MANAGER
// ══════════════════════════════════
function openVoiceManager(){
  document.getElementById('vm-overlay').classList.remove('hidden')
  renderVoiceManager()
}
function closeVoiceManager(){document.getElementById('vm-overlay').classList.add('hidden')}

function renderVoiceManager(){
  const content=document.getElementById('vm-content')
  const footer=document.getElementById('vm-footer')
  document.getElementById('vm-title').textContent='Perfis de Voz'

  if(voiceProfiles.length===0){
    content.innerHTML=`
      <div style="text-align:center;padding:32px 0;">
        <div style="font-size:36px;margin-bottom:12px">🎤</div>
        <p style="color:var(--muted);font-size:13px">Nenhum perfil calibrado ainda.<br>Calibre sua voz para melhorar a sincronização.</p>
      </div>`
  } else {
    content.innerHTML=`<div class="profile-list" id="profile-list"></div>`
    const list=document.getElementById('profile-list')
    voiceProfiles.forEach(p=>{
      const isActive=p.id===activeProfileId
      const quality=p.accuracy>=0.65?'Excelente':p.accuracy>=0.45?'Boa':'Fraca'
      const div=document.createElement('div')
      div.className='profile-item'+(isActive?' active-profile':'')
      div.innerHTML=`
        <div class="profile-info">
          <div class="profile-name">${esc(p.name)}${isActive?' <span style="font-size:10px;color:var(--green);font-weight:400">● ativo</span>':''}</div>
          <div class="profile-meta">Precisão ${Math.round(p.accuracy*100)}% · ${p.wpm} wpm · ${quality} · ${p.lang}</div>
        </div>
        <div class="profile-actions">
          ${!isActive?`<button class="btn" style="font-size:11px;padding:5px 10px" onclick="setActiveProfile('${p.id}')">Usar</button>`:''}
          <button class="btn" style="font-size:11px;padding:5px 10px" onclick="recalibrateProfile('${p.id}')">Recalibrar</button>
          <button class="btn danger" style="font-size:11px;padding:5px 8px" onclick="deleteProfile('${p.id}')">✕</button>
        </div>`
      list.appendChild(div)
    })
  }

  footer.innerHTML=`
    <button class="btn" onclick="closeVoiceManager()">Fechar</button>
    <button class="btn primary" onclick="startNewCalibration()">+ Nova calibragem</button>`
}

function setActiveProfile(id){
  activeProfileId=id;saveProfiles();updateCalStatusBadge();renderVoiceManager()
}

function deleteProfile(id){
  if(!confirm('Excluir este perfil de voz?'))return
  voiceProfiles=voiceProfiles.filter(p=>p.id!==id)
  if(activeProfileId===id)activeProfileId=voiceProfiles[0]?.id||null
  saveProfiles();updateCalStatusBadge();renderVoiceManager()
}

function recalibrateProfile(id){
  const p=voiceProfiles.find(x=>x.id===id)
  if(!p)return
  closeVoiceManager()
  startCalibration(p.name,id)
}

function startNewCalibration(){
  closeVoiceManager()
  startCalibration('','new')
}

function updateCalStatusBadge(){
  const p=getActiveProfile()
  const btn=document.getElementById('cal-status-btn')
  const lbl=document.getElementById('cal-status-label')
  if(p){
    btn.className='cal-status calibrated'
    lbl.textContent=p.name+' ✓'
  } else {
    btn.className='cal-status'
    lbl.textContent='Calibrar voz'
  }
}

// ══════════════════════════════════
// CALIBRATION
// ══════════════════════════════════
const CAL_SENTENCES={
  'pt-BR':['A tecnologia está transformando a forma como nos comunicamos.','Cada palavra dita com clareza ajuda o sistema a te acompanhar melhor.','O teleprompter sincroniza automaticamente com a sua voz durante a gravação.','Fale em ritmo natural, como se estivesse apresentando para uma câmera.'],
  'en-US':['Technology is transforming the way we communicate with each other.','Speaking clearly helps the system follow your voice more accurately.','The teleprompter automatically synchronizes with your speech during recording.','Speak at a natural pace, as if you were presenting to a camera.'],
  'es-ES':['La tecnología está transformando la forma en que nos comunicamos.','Hablar con claridad ayuda al sistema a seguir tu voz con más precisión.','El teleprompter se sincroniza automáticamente con tu voz durante la grabación.','Habla a un ritmo natural, como si estuvieras presentando ante una cámara.'],
}

let calState={step:0,profileId:'new',profileName:'',scores:[],timestamps:[],recognizer:null,listening:false,detectedFillers:[]}

function startCalibration(existingName,profileId){
  calState={step:0,profileId,profileName:existingName,scores:[],timestamps:[],recognizer:null,listening:false,detectedFillers:[]}
  document.getElementById('cal-overlay').classList.remove('hidden')
  renderCalStep()
}

function closeCalibration(){
  calStopRec()
  document.getElementById('cal-overlay').classList.add('hidden')
}

function getSentences(){return CAL_SENTENCES[settings.lang]||CAL_SENTENCES['pt-BR']}

function renderCalStep(){
  const step=calState.step
  ;[0,1,2,3].forEach(i=>{
    const el=document.getElementById('cdot-'+i)
    el.className='cal-step-dot'+(i<step?' done':i===Math.min(step,3)?' active':'')
  })

  if(step===0){
    document.getElementById('cal-title').textContent=calState.profileId==='new'?'Nova Calibragem':'Recalibrar: '+calState.profileName
    document.getElementById('cal-desc').textContent='Leia 4 frases em voz alta. O sistema aprende o seu padrão de fala para sincronizar melhor.'
    document.getElementById('cal-step-label').textContent='Pronto para começar'
    document.getElementById('cal-btn-skip').textContent='Cancelar'
    document.getElementById('cal-btn-next').textContent='Começar ▶'
    document.getElementById('cal-btn-next').disabled=false

    // Name input — only for new profiles
    const nameSection=calState.profileId==='new'?`
      <div style="margin-bottom:4px">
        <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em">Nome do perfil</label>
        <input class="name-input" id="cal-name-input" placeholder="Ex: Minha voz, Voz grave, Estúdio…" value="${esc(calState.profileName)}" maxlength="40" oninput="calState.profileName=this.value">
      </div>`:
      `<div style="background:#161616;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px;font-size:13px;color:var(--muted)">Recalibrando perfil: <strong style="color:#fff">${esc(calState.profileName)}</strong></div>`

    document.getElementById('cal-step-content').innerHTML=`
      ${nameSection}
      <div style="background:#161616;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:16px;">
        <p style="font-size:13px;color:var(--muted);line-height:1.75">
          ✓ &nbsp;Fale em ritmo normal — sem exagerar a dicção<br>
          ✓ &nbsp;Ambiente silencioso dá melhores resultados<br>
          ✓ &nbsp;O microfone abre automaticamente em cada frase<br>
          ✓ &nbsp;Os thresholds do algoritmo são ajustados para a sua voz
        </p>
      </div>`
  }

  else if(step>=1&&step<=4){
    const idx=step-1
    const sentence=getSentences()[idx]
    document.getElementById('cal-title').textContent='Leia em voz alta'
    document.getElementById('cal-desc').textContent='Fale a frase abaixo naturalmente. O microfone está ouvindo.'
    document.getElementById('cal-step-label').textContent=`Frase ${step} de 4`
    document.getElementById('cal-btn-skip').textContent='Pular frase'
    document.getElementById('cal-btn-next').textContent=step<4?'Próxima →':'Ver resultado'
    document.getElementById('cal-btn-next').disabled=true

    document.getElementById('cal-step-content').innerHTML=`
      <div class="sentence-card">
        <div class="sentence-num">Frase ${step} de 4</div>
        <div class="sentence-text">${esc(sentence)}</div>
      </div>
      <div class="listen-indicator active" id="cal-wave">
        ${Array(7).fill('<div class="wave-bar"></div>').join('')}
      </div>
      <div class="transcript-box" id="cal-transcript"><span style="opacity:.3">Ouvindo…</span></div>
      <div class="score-row" id="cal-score-row" style="display:none">
        <span style="font-size:12px;color:var(--muted);min-width:80px">Similaridade</span>
        <div class="score-bar-wrap"><div class="score-bar-fill" id="cal-score-fill" style="width:0%"></div></div>
        <span class="score-val" id="cal-score-val">0%</span>
      </div>`

    calState.timestamps[idx]=Date.now()
    setTimeout(()=>calStartListening(sentence,idx),200)
  }

  else if(step===5){
    calStopRec()
    const scores=calState.scores.filter(s=>s!=null)
    const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0

    let totalWords=0,totalSecs=0
    const sents=getSentences()
    calState.timestamps.forEach((t,i)=>{
      if(calState.scores[i]!=null&&calState.timestamps[i+1]){
        totalWords+=sents[i].split(' ').length
        totalSecs+=(calState.timestamps[i+1]-t)/1000
      }
    })
    const wpm=totalSecs>0?Math.round(totalWords/(totalSecs/60)):130

    let thresholdScale=1,confirmNeeded=2
    if(avg>0.7){thresholdScale=1.0;confirmNeeded=2}
    else if(avg>0.55){thresholdScale=0.75;confirmNeeded=2}
    else if(avg>0.4){thresholdScale=0.55;confirmNeeded=1}
    else if(avg>0.25){thresholdScale=0.4;confirmNeeded=1}
    else{thresholdScale=0.3;confirmNeeded=1}

    const sugSpeed=wpm<100?2:wpm<130?3:wpm<160?4:wpm<200?5:6
    const quality=avg>=0.65?{l:'Excelente',c:'good'}:avg>=0.45?{l:'Boa',c:'ok'}:{l:'Fraca',c:'bad'}

    // Determine profile name
    let profileName=calState.profileName.trim()
    if(!profileName)profileName='Perfil '+(voiceProfiles.length+1)

    // Save or update profile
    const profileData={
      id:calState.profileId==='new'?genId():calState.profileId,
      name:profileName,
      done:true,accuracy:Math.round(avg*100)/100,wpm,
      thresholdScale,confirmNeeded,fillers:[...calState.detectedFillers],
      lang:settings.lang,createdAt:Date.now(),
    }

    if(calState.profileId==='new'){
      voiceProfiles.push(profileData)
    } else {
      voiceProfiles=voiceProfiles.map(p=>p.id===calState.profileId?{...p,...profileData,id:p.id}:p)
    }
    activeProfileId=profileData.id
    saveProfiles();updateCalStatusBadge()

    // Auto-set speed
    settings.speed=sugSpeed;save(K.settings,settings)
    document.getElementById('s-speed').value=sugSpeed
    document.getElementById('s-speed-v').textContent=sugSpeed

    document.getElementById('cal-title').textContent='Calibragem concluída'
    document.getElementById('cal-desc').textContent='Perfil "'+profileName+'" salvo e ativado.'
    document.getElementById('cal-step-label').textContent='Concluído'
    document.getElementById('cal-btn-skip').style.display='none'
    document.getElementById('cal-btn-next').textContent='Fechar'
    document.getElementById('cal-btn-next').disabled=false

    document.getElementById('cal-step-content').innerHTML=`
      <div class="result-grid">
        <div class="result-card"><div class="rc-label">Precisão</div><div class="rc-val">${Math.round(avg*100)}%</div><div class="rc-sub"><span class="cal-badge ${quality.c}">${quality.l}</span></div></div>
        <div class="result-card"><div class="rc-label">Velocidade</div><div class="rc-val">${wpm}</div><div class="rc-sub">palavras/min</div></div>
      </div>
      <div style="background:#161616;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px;margin-top:2px">
        <div class="cal-profile-row"><span>Threshold ajustado</span><span>${Math.round(0.24*thresholdScale*100)}%</span></div>
        <div class="cal-profile-row"><span>Confirmações</span><span>${confirmNeeded} resultado${confirmNeeded>1?'s':''}</span></div>
        <div class="cal-profile-row"><span>Velocidade sugerida</span><span>${sugSpeed}</span></div>
        <div class="cal-profile-row"><span>Frases avaliadas</span><span>${scores.length}/4</span></div>
      </div>
      ${avg<0.35?`<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:12px;font-size:12px;color:rgba(239,68,68,.9)">⚠ Precisão baixa. Verifique o microfone, tente em ambiente mais silencioso e recalibre.</div>`:''}`
  }
}

function calNext(){
  if(calState.step===0){
    if(calState.profileId==='new'){
      const inp=document.getElementById('cal-name-input')
      if(inp)calState.profileName=inp.value.trim()
    }
    calState.step=1;renderCalStep();return
  }
  if(calState.step>=1&&calState.step<=4){
    calStopRec();calState.step++;
    if(calState.step>4)calState.step=5
    document.getElementById('cal-btn-next').disabled=false
    renderCalStep();return
  }
  if(calState.step===5){closeCalibration();return}
}

function calSkip(){
  if(calState.step===0){closeCalibration();return}
  calStopRec();calState.scores[calState.step-1]=null;calState.step++
  if(calState.step>4)calState.step=5
  document.getElementById('cal-btn-next').disabled=false;renderCalStep()
}

function calStopRec(){
  if(calState.recognizer){
    try{calState.recognizer.abort()}catch{}
    calState.recognizer.onresult=null;calState.recognizer.onerror=null
    calState.recognizer.onend=null;calState.recognizer=null
  }
  calState.listening=false
}

function calStartListening(targetSentence,idx){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  if(!SR){
    document.getElementById('cal-transcript').innerHTML='<span style="color:var(--red)">Reconhecimento não suportado neste browser.</span>'
    document.getElementById('cal-btn-next').disabled=false;return
  }
  calStopRec()
  const r=new SR()
  r.lang=settings.lang;r.continuous=false;r.interimResults=true;r.maxAlternatives=1
  calState.recognizer=r;calState.listening=true

  const targetNorm=normalize(targetSentence)
  const targetSet=new Set(bigrams(targetNorm))
  let bestScore=0,finalT=''

  r.onresult=e=>{
    const res=e.results[e.results.length-1]
    const t=res[0].transcript;const isFinal=res.isFinal
    if(isFinal){
      finalT=t;calState.timestamps[idx+1]=Date.now()
      const tw=normalize(t).split(' ').filter(Boolean)
      const tgtW=new Set(targetNorm.split(' ').filter(Boolean))
      tw.forEach(w=>{if(!tgtW.has(w)&&w.length>1&&!FILLERS_BASE.has(w)&&!calState.detectedFillers.includes(w))calState.detectedFillers.push(w)})
    }
    const score=diceFromSets(targetSet,new Set(bigrams(normalize(t))))
    if(score>bestScore)bestScore=score
    const box=document.getElementById('cal-transcript')
    if(box)box.innerHTML=isFinal?`<span style="color:#fff">${esc(t)}</span>`:`<span style="color:#fff">${esc(finalT)} </span><span style="color:rgba(255,255,255,.35)">${esc(t)}</span>`
    if(score>0||isFinal){
      const pct=Math.round(bestScore*100),col=pct>=60?'var(--green)':pct>=35?'var(--amber)':'var(--red)'
      const sr=document.getElementById('cal-score-row')
      if(sr)sr.style.display='flex'
      const sf=document.getElementById('cal-score-fill')
      if(sf){sf.style.width=pct+'%';sf.style.background=col}
      const sv=document.getElementById('cal-score-val')
      if(sv){sv.textContent=pct+'%';sv.style.color=col}
    }
    if(isFinal){
      calState.scores[idx]=bestScore;calState.listening=false
      const wave=document.getElementById('cal-wave')
      if(wave)wave.classList.remove('active')
      document.getElementById('cal-btn-next').disabled=false
    }
  }
  r.onerror=e=>{
    if(e.error==='aborted')return
    const box=document.getElementById('cal-transcript')
    if(box)box.innerHTML=`<span style="color:var(--red)">Erro: ${e.error}</span>`
    document.getElementById('cal-btn-next').disabled=false
  }
  r.onend=()=>{
    const wave=document.getElementById('cal-wave')
    if(wave)wave.classList.remove('active')
    if(calState.listening&&bestScore===0)document.getElementById('cal-btn-next').disabled=false
  }
  try{r.start()}catch{
    document.getElementById('cal-btn-next').disabled=false
  }
}

// TELEPROMPTER ENGINE
// ══════════════════════════════════
let tpLines=[],tpActive=0,tpPlaying=false,tpRaf=null,tpLastTs=null,tpOffsets=[]

// ── SYNC MODE ─────────────────────
// When mic is ON, auto-scroll STOPS.
// The scroll only moves when speech sync triggers scrollToLine.
// When mic is OFF, auto-scroll runs normally.
let micIsOn=false   // true = voice drives scroll, auto-scroll paused

let barTimer=null
function showBar(){
  document.getElementById('tp-bar').classList.remove('hidden')
  document.getElementById('tp-hint').classList.remove('hidden')
  document.getElementById('teleprompter').classList.add('cursor-visible')
  clearTimeout(barTimer)
  if(tpPlaying&&!micIsOn)barTimer=setTimeout(()=>{
    document.getElementById('tp-bar').classList.add('hidden')
    document.getElementById('tp-hint').classList.add('hidden')
    document.getElementById('teleprompter').classList.remove('cursor-visible')
  },3000)
}

function parseLines(c){return c.split('\n').map((t,i)=>({index:i,text:t.trim(),empty:t.trim()===''})) }

function renderTp(){
  flushSave();const sc=getActive();if(!sc)return
  tpLines=parseLines(sc.content)
  const scroll=document.getElementById('tp-scroll');scroll.innerHTML=''
  const s=settings
  const wrap=document.createElement('div')
  wrap.className='tp-content';wrap.style.width=s.blockWidth+'%';wrap.style.margin='0 auto'
  tpLines.forEach(line=>{
    const el=document.createElement(line.empty?'div':'p')
    el.className=line.empty?'tp-spacer':'tp-line'
    if(!line.empty){
      el.dataset.idx=line.index;el.textContent=line.text
      el.style.fontSize=s.fontSize+'px';el.style.lineHeight=s.lineHeight
      el.addEventListener('click',()=>{tpGoTo(line.index);smootherReset(line.index)})
    }
    wrap.appendChild(el)
  })
  scroll.appendChild(wrap)
  const tp=document.getElementById('teleprompter')
  tp.className='screen'
  const bg=s.bgColor||'#000000'
  const fg=s.fgColor||'#ffffff'
  tp.style.background=bg
  if(s.mirrored)tp.style.transform='scaleX(-1)';else tp.style.removeProperty('transform')

  // Fade gradients use bg color
  document.querySelector('.tp-fade-top').style.background=`linear-gradient(to bottom,${bg} 0%,transparent 100%)`
  document.querySelector('.tp-fade-bot').style.background=`linear-gradient(to top,${bg} 0%,transparent 100%)`

  // Rail colors
  document.getElementById('tp-rail-fill').style.background=fg+'60'
  document.getElementById('tp-rail-marker').style.background=fg

  // Controls bar bg — darken/lighten the bg color slightly
  const isLight=isLightColor(bg)
  const ctrlBg=isLight?'rgba(255,255,255,0.92)':'rgba(0,0,0,0.88)'
  const ctrlBorder=isLight?'rgba(0,0,0,0.08)':'rgba(255,255,255,0.07)'
  document.querySelector('.tp-controls').style.background=ctrlBg
  document.querySelector('.tp-controls').style.borderTopColor=ctrlBorder
  document.querySelector('.tp-progress').style.background=isLight?'rgba(0,0,0,0.1)':'rgba(255,255,255,0.1)'
  document.getElementById('tp-prog').style.background=isLight?'rgba(0,0,0,0.4)':'rgba(255,255,255,0.5)'
  document.getElementById('tp-hint').style.background=ctrlBg
  document.getElementById('tp-hint').style.color=isLight?'rgba(0,0,0,0.25)':'rgba(255,255,255,0.2)'

  // Play button
  const pb=document.getElementById('tp-play-btn')
  pb.style.background=fg;pb.style.color=bg
  tpActive=0;micIsOn=false
  setTimeout(()=>{
    rebuildOffsets()
    // aplica cores explicitamente em cada linha após render
    const fg=s.fgColor||'#ffffff'
    document.querySelectorAll('.tp-line').forEach(el=>{ el.style.color=fg })
    updateActiveStyles()
    updateProgress()
    buildChunks()
  },80)
}

function rebuildOffsets(){
  tpOffsets=[]
  document.querySelectorAll('.tp-line').forEach(el=>{tpOffsets[+el.dataset.idx]=el.offsetTop+el.offsetHeight/2})
}

function isLightColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16)
  return(r*299+g*587+b*114)/1000>128
}

function updateActiveStyles(){
  const s=settings
  const fg=s.fgColor||'#ffffff'
  const focusR=s.focusLines>0?Math.floor(s.focusLines/2):999
  document.querySelectorAll('.tp-line').forEach(el=>{
    const dist=Math.abs(+el.dataset.idx-tpActive)
    const active=dist===0,inFocus=dist<=focusR
    const opacity=active?1:!inFocus?0:Math.max(0.12,0.55-dist*0.12)
    el.style.color=fg;el.style.opacity=opacity
    el.style.fontWeight=active?700:400
    el.style.transform=active?'scale(1.04)':'scale(1)'
    el.style.visibility=(!inFocus&&s.focusLines>0)?'hidden':'visible'
  })
}

function computeActiveLine(){
  const scroll=document.getElementById('tp-scroll');if(!scroll)return
  const readingY=scroll.scrollTop+scroll.clientHeight*0.38
  let best=tpActive,min=Infinity
  tpOffsets.forEach((top,i)=>{if(top==null)return;const d=Math.abs(top-readingY);if(d<min){min=d;best=i}})
  if(best!==tpActive){tpActive=best;updateActiveStyles();updateProgress()}
}

function updateProgress(){
  const ne=tpLines.filter(l=>!l.empty)
  const pct=ne.length>0?tpActive/Math.max(ne.length-1,1):0
  document.getElementById('tp-prog').style.width=(pct*100)+'%'
  document.getElementById('tp-rail-fill').style.height=(pct*100)+'%'
  document.getElementById('tp-rail-marker').style.top=(pct*100)+'%'
  document.getElementById('ctrl-info').textContent=Math.round(pct*100)+'% · '+(tpActive+1)+'/'+ne.length
}

function speedToPx(s){return Math.round(28*Math.pow(s,1.35))}

function startRaf(){
  tpLastTs=null
  const tick=ts=>{
    // FIX: stop auto-scroll when mic is on — voice drives scroll instead
    if(!tpPlaying||micIsOn){tpRaf=null;return}
    const scroll=document.getElementById('tp-scroll');if(!scroll){tpRaf=null;return}
    if(tpLastTs!==null){
      const dt=Math.min(ts-tpLastTs,100)/1000
      const px=speedToPx(settings.speed)*dt
      const max=scroll.scrollHeight-scroll.clientHeight
      if(scroll.scrollTop>=max){tpPause();return}
      scroll.scrollTop=Math.min(scroll.scrollTop+px,max)
      computeActiveLine()
    }
    tpLastTs=ts;tpRaf=requestAnimationFrame(tick)
  }
  tpRaf=requestAnimationFrame(tick)
}

function stopRaf(){if(tpRaf){cancelAnimationFrame(tpRaf);tpRaf=null}tpLastTs=null}

function tpPlay(){
  tpPlaying=true
  document.getElementById('tp-play-btn').innerHTML='⏸'
  // só inicia o scroll automático se o mic NÃO estiver ligado
  if(!micIsOn) startRaf()
  showBar()
}
function tpPause(){
  tpPlaying=false
  document.getElementById('tp-play-btn').innerHTML='▶'
  stopRaf()
  showBar()
}
function tpToggle(){tpPlaying?tpPause():tpPlay()}

function tpRestart(){
  stopRaf();tpPlaying=false;document.getElementById('tp-play-btn').innerHTML='▶'
  document.getElementById('tp-scroll').scrollTop=0;tpActive=0
  updateActiveStyles();updateProgress();smootherReset(0);showBar()
}

function tpGoTo(idx,smooth=true){
  const scroll=document.getElementById('tp-scroll')
  const el=document.querySelector(`.tp-line[data-idx="${idx}"]`)
  if(!scroll||!el)return
  scroll.scrollTo({top:Math.max(0,el.offsetTop-scroll.clientHeight*0.38),behavior:smooth?'smooth':'instant'})
}

function tpRecenter(){tpGoTo(tpActive)}
function tpStepSpeed(d){settings.speed=Math.min(10,Math.max(1,settings.speed+d));save(K.settings,settings);updateSpeedDisplay();showBar()}

function updateSpeedDisplay(){

  const bars=document.getElementById('speed-bars')

  const fg=settings.fgColor||'#ffffff'

  for(let i=0;i<10;i++){const b=document.createElement('div');b.className='speed-bar-seg';b.style.height=(4+i*0.8)+'px';b.style.background=i<s?fg:ia;bars.appendChild(b)}
}

function updateGuide(){
  document.getElementById('tp-guide').style.top=(document.getElementById('teleprompter').clientHeight*0.38)+'px'
}

let cdInterval=null
function startCountdown(cb){
  if(settings.countdown<=0){cb();return}
  let rem=settings.countdown
  const el=document.getElementById('tp-countdown'),num=document.getElementById('cd-num')
  el.classList.remove('hidden');num.textContent=rem;void num.offsetWidth
  cdInterval=setInterval(()=>{
    rem--;if(rem<=0){clearInterval(cdInterval);cdInterval=null;el.classList.add('hidden');cb()}
    else{num.style.animation='none';void num.offsetWidth;num.style.animation='';num.textContent=rem}
  },1000)

function openTeleprompter(){
  flushSave();const sc=getActive()
  if(!sc||!sc.content.trim()){alert('Escreva algo no roteiro antes de iniciar.');return}
  document.getElementById('editor').classList.add('hidden')
  document.getElementById('teleprompter').classList.remove('hidden')

  tpPlaying=false
  document.getElementById('tp-play-btn').innerHTML='▶'
  setTimeout(()=>{
    if(settings.countdown>0){
      // mostra contagem mas não inicia scroll automaticamente
      startCountdown(()=>{

      })

    }

function closeTeleprompter(){
  stopRaf();tpPlaying=false;micIsOn=false
  if(cdInterval){clearInterval(cdInterval);cdInterval=null}
  document.getElementById('tp-countdown').classList.add('hidden')

  if(!document.fullscreenElement)document.getElementById('teleprompter').requestFullscreen?.().catch(()=>{})
  else document.exitFullscreen()
}

document.getElementById('tp-scroll').addEventListener('scroll',()=>{if(!tpPlaying&&!micIsOn)computeActiveLine()},{passive:true})
new ResizeObserver(()=>{rebuildOffsets();updateGuide()}).observe(document.getElementById('tp-scroll'))

// SPEECH
// ══════════════════════════════════
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition
let recognizer=null,micIntentionalStop=false,reconnectCount=0
let sessionTimer=null,restartTimer=null
const MAX_RECONNECTS=10

function micStart(){
  if(!SpeechRecognition){setMicUI('unsupported');return}
  micIntentionalStop=false;micIsOn=true;reconnectCount=0
  // FIX: when mic turns on, stop the auto-scroll RAF
  stopRaf()
  // Keep tpPlaying=true so UI shows pause button, but RAF is off
  setMicUI('listening')
  startSession()
  updateMicModeIndicator()
}

function micStop(){
  micIntentionalStop=true;micIsOn=false
  clearTimeout(sessionTimer);clearTimeout(restartTimer);destroyRec()
  setMicUI('idle')
  // FIX: resume auto-scroll if still playing
  if(tpPlaying)startRaf()
  updateMicModeIndicator()
}

function micToggle(){micIsOn?micStop():micStart()}

function destroyRec(){
  if(!recognizer)return
  recognizer.onresult=null;recognizer.onerror=null;recognizer.onend=null;recognizer.onstart=null
  try{recognizer.abort()}catch{}
  recognizer=null
}

function startSession(){
  if(micIntentionalStop)return
  destroyRec()
  const r=new SpeechRecognition()
  r.lang=settings.lang||'pt-BR';r.continuous=false;r.interimResults=true;r.maxAlternatives=1
  recognizer=r

  r.onstart=()=>{reconnectCount=0;setMicUI('listening');sessionTimer=setTimeout(()=>{if(!micIntentionalStop)destroyRec()},25000)}

  r.onresult=e=>{
    const res=e.results[e.results.length-1]
    processTranscript(res[0].transcript,res.isFinal)
  }

  r.onerror=e=>{
    if(e.error==='aborted'||e.error==='no-speech')return
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      micIntentionalStop=true;micIsOn=false;setMicUI('error')
      showConfToast('Permissão de microfone negada');return
    }
  }

  r.onend=()=>{
    clearTimeout(sessionTimer)
    if(micIntentionalStop)return
    if(reconnectCount>=MAX_RECONNECTS){micIsOn=false;setMicUI('error');return}
    reconnectCount++;setMicUI('reconnecting')
    restartTimer=setTimeout(startSession,400)
  }

  try{r.start()}catch{setMicUI('error');micIsOn=false}
}

function setMicUI(state){
  const btn=document.getElementById('mic-btn'),lbl=document.getElementById('mic-label')
  btn.className='mic-btn'
  if(!SpeechRecognition){btn.classList.add('unsupported');lbl.textContent='N/A';return}
  if(state==='listening'){btn.classList.add('listening');lbl.className='mic-label on';lbl.textContent='ON'}
  else if(state==='error'){btn.classList.add('error');lbl.className='mic-label off';lbl.textContent='ERRO'}
  else if(state==='reconnecting'){btn.classList.add('idle');lbl.className='mic-label off';lbl.textContent='...'}
  else{btn.classList.add('idle');lbl.className='mic-label off';lbl.textContent='VOZ'}
}

function updateMicModeIndicator(){
  // Show a subtle badge in the controls bar showing current sync mode
  let badge=document.getElementById('sync-mode-badge')
  if(!badge){
    badge=document.createElement('span')
    badge.id='sync-mode-badge'
    document.getElementById('tp-controls').insertBefore(badge,document.getElementById('ctrl-info'))
  }
  if(micIsOn){
    badge.className='sync-mode-badge voice'
    badge.textContent='🎤 voz'
  } else {
    badge.className='sync-mode-badge auto'
    badge.textContent='auto'
  }
}

// ══════════════════════════════════
// MATCHING
// ══════════════════════════════════
let tpChunks=[]
function buildChunks(){
  tpChunks=tpLines.map(line=>{
    const text=normalize(line.text)
    return{index:line.index,empty:line.empty,text,bigramSet:new Set(bigrams(text)),wc:text.split(' ').filter(Boolean).length}
  })
}

function scoreChunk(tSet,idx){
  const c=tpChunks[idx];if(!c||c.empty)return 0
  const s1=diceFromSets(tSet,c.bigramSet)
  let s2=0
  if(idx+1<tpChunks.length&&!tpChunks[idx+1].empty){
    const m=new Set([...c.bigramSet,...tpChunks[idx+1].bigramSet]);s2=diceFromSets(tSet,m)
  }
  return Math.max(s1,s2)
}

function findMatch(transcript){
  const tSet=new Set(bigrams(normalize(transcript)))
  if(!tSet.size)return{found:false,index:tpActive,score:0}
  const eligible=tpChunks.filter(c=>!c.empty)
  const curI=Math.max(0,eligible.findIndex(c=>c.index>=tpActive))
  let best=null
  for(let i=Math.max(0,curI-4);i<=Math.min(eligible.length-1,curI+12);i++){
    const score=scoreChunk(tSet,eligible[i].index)
    const boosted=i>=curI?score*1.15:score
    if(!best||boosted>best.boosted)best={index:eligible[i].index,score,boosted,wc:eligible[i].wc}
  }
  if(best&&best.score>=adaptiveThreshold(best.wc))return{found:true,index:best.index,score:best.score}
  let gb=null
  for(let i=0;i<eligible.length;i++){const score=scoreChunk(tSet,eligible[i].index);if(!gb||score>gb.score)gb={index:eligible[i].index,score,wc:eligible[i].wc}}
  if(gb&&gb.score>=adaptiveThreshold(gb.wc))return{found:true,index:gb.index,score:gb.score}
  return{found:false,index:tpActive,score:best?.score||0}
}

let smoother={confirmed:0,pending:0,count:0}
function smootherReset(i){smoother={confirmed:i,pending:i,count:0}}

function applySmoothing(match){
  const cal=getCal()
  const CONFIRM=cal.done?cal.confirmNeeded:2
  const HIGH=0.72,BACKTRACK=3
  if(!match.found)return smoother.confirmed
  const cand=match.index
  if(cand<smoother.confirmed-BACKTRACK)return smoother.confirmed
  if(match.score>=HIGH){smoother={confirmed:cand,pending:cand,count:0};return cand}
  if(cand===smoother.pending){
    smoother.count++
    if(smoother.count>=CONFIRM){smoother={confirmed:cand,pending:cand,count:0};return cand}
    return smoother.confirmed
  }
  smoother={confirmed:smoother.confirmed,pending:cand,count:1}
  return smoother.confirmed
}

let confToastTimer=null
function showConfToast(msg){
  const el=document.getElementById('conf-toast');el.textContent='◈ '+msg
  el.classList.remove('hidden');clearTimeout(confToastTimer)
  confToastTimer=setTimeout(()=>el.classList.add('hidden'),4000)
}

function processTranscript(transcript){
  if(!micIsOn)return   // safety guard
  const match=findMatch(transcript)
  const pct=Math.round(match.score*100)
  const fill=document.getElementById('mic-score-fill')
  fill.style.width=pct+'%'
  fill.style.background=pct>=60?'#22c55e':pct>=35?'#f59e0b':'#ef4444'
  if(match.score>0&&match.score<0.28)showConfToast('Sincronização imprecisa ('+pct+'%)')
  const accepted=applySmoothing(match)
  // FIX: only scroll if line actually changed — don't move if no match found
  if(match.found&&accepted!==tpActive){
    tpActive=accepted;updateActiveStyles();updateProgress();tpGoTo(accepted)
  }
}

// ══════════════════════════════════
// KEYBOARD
// ══════════════════════════════════
document.addEventListener('keydown',e=>{
  const tag=e.target.tagName
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return
  if(!document.getElementById('teleprompter').classList.contains('hidden')){
    switch(e.key){
      case ' ':e.preventDefault();tpToggle();break
      case 'ArrowUp':e.preventDefault();tpStepSpeed(-1);break
      case 'ArrowDown':e.preventDefault();tpStepSpeed(1);break
      case 'ArrowLeft':e.preventDefault();skipLines(-1);break
      case 'ArrowRight':e.preventDefault();skipLines(1);break
      case 'f':case 'F':e.preventDefault();toggleFullscreen();break
      case 'r':case 'R':e.preventDefault();tpRestart();break
      case 'c':case 'C':e.preventDefault();tpRecenter();break
      case 'm':case 'M':e.preventDefault();micToggle();break
      case 'Escape':closeTeleprompter();break
    }
    showBar()
  }
})

function skipLines(dir){
  const ne=tpLines.filter(l=>!l.empty)
  const cur=ne.findIndex(l=>l.index===tpActive)
  const next=Math.min(Math.max(0,cur+dir*3),ne.length-1)
  tpGoTo(ne[next].index);smootherReset(ne[next].index)
}

document.getElementById('teleprompter').addEventListener('mousemove',showBar)
document.getElementById('teleprompter').addEventListener('touchstart',showBar,{passive:true})

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
renderSidebar()
loadActiveToEditor()
initSettingsUI()
updateStats()
updateCalStatusBadge()
</script>
