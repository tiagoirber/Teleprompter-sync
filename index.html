<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TelePrompter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;background:#111;color:#eee}

/* ── VIEWS ── */
#view-editor,#view-tp{display:flex;flex-direction:column;height:100%}
#view-tp{display:none}

/* ── EDITOR HEADER ── */
.eh{display:flex;align-items:center;gap:8px;padding:0 14px;height:48px;background:#0d0d0d;border-bottom:1px solid #222;flex-shrink:0;flex-wrap:wrap}
.logo{font-size:13px;font-weight:700;color:#fff;white-space:nowrap}
.eh-mid{display:flex;align-items:center;gap:8px;flex:1;flex-wrap:wrap;justify-content:flex-end}
.ebtn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid #444;background:transparent;color:#bbb;white-space:nowrap}
.ebtn:hover{background:#1e1e1e;color:#fff}
.ebtn.ok{border-color:rgba(34,197,94,.4);color:#22c55e;background:rgba(34,197,94,.08)}
.ebtn.start{background:#fff;color:#000;border-color:#fff}
.ebtn.start:hover{background:#e8e8e8}

/* ── EDITOR BODY ── */
.ebody{display:flex;flex:1;overflow:hidden}
.sidebar{width:190px;min-width:190px;background:#0a0a0a;border-right:1px solid #222;display:flex;flex-direction:column;flex-shrink:0}
.sh{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-bottom:1px solid #222;flex-shrink:0}
.sh span{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#555}
.sb-add{background:none;border:1px solid #333;color:#aaa;width:20px;height:20px;border-radius:4px;cursor:pointer;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center}
.sb-add:hover{background:#1e1e1e}
.slist{flex:1;overflow-y:auto;padding:3px 0}
.si{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;cursor:pointer;border-left:2px solid transparent;gap:4px}
.si:hover{background:#111}
.si.on{border-left-color:#fff;background:#111}
.si-t{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#777}
.si.on .si-t{color:#fff}
.si-x{opacity:0;font-size:11px;color:#555;background:none;border:none;cursor:pointer;padding:1px 4px;border-radius:3px}
.si:hover .si-x{opacity:1}
.si-x:hover{color:#ef4444}
.sfoot{padding:7px 11px;border-top:1px solid #222;font-size:10px;color:#444}
.emain{flex:1;display:flex;flex-direction:column;overflow:hidden}
.title-wrap{padding:11px 17px 0;flex-shrink:0}
.title-inp{width:100%;background:transparent;border:none;outline:none;font-size:18px;font-weight:700;color:#fff;padding:3px 0}
.title-inp::placeholder{color:#333}
.ta-wrap{flex:1;padding:7px 17px 0;overflow:hidden;display:flex}
textarea{flex:1;width:100%;background:transparent;border:none;outline:none;resize:none;font-size:14px;line-height:1.75;color:#bbb;font-family:inherit}
textarea::placeholder{color:#333}
.statbar{display:flex;align-items:center;gap:9px;padding:6px 17px;border-top:1px solid #222;font-size:11px;color:#444;flex-shrink:0}
.sdot{width:5px;height:5px;border-radius:50%;background:#22c55e}
.sdot.saving{background:#f59e0b;animation:bl 1s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TELEPROMPTER ── */
/* Config bar — top, always visible */
.tp-cfg{display:flex;align-items:center;flex-wrap:wrap;gap:6px 10px;padding:7px 12px;background:#0a0a0a;border-bottom:1px solid #222;flex-shrink:0}
.cfg-g{display:flex;align-items:center;gap:4px}
.cfg-l{font-size:10px;color:#666;white-space:nowrap}
.cfg-v{font-size:10px;color:#ccc;min-width:26px;font-weight:600}
input[type=range]{width:65px;cursor:pointer;accent-color:#fff}
input[type=color]{width:26px;height:20px;border:1px solid #333;border-radius:3px;cursor:pointer;padding:1px;background:transparent}
.csel{background:#111;border:1px solid #333;color:#ccc;font-size:10px;padding:2px 5px;border-radius:4px;cursor:pointer;outline:none}
.csep{width:1px;height:14px;background:#2a2a2a;flex-shrink:0}
.ctog{font-size:10px;padding:2px 7px;border-radius:4px;cursor:pointer;border:1px solid #333;background:transparent;color:#666}
.ctog.on{background:#222;color:#fff;border-color:#555}

/* Scroll area */
.tp-scroll{flex:1;overflow-y:auto;background:#000}
.tp-scroll::-webkit-scrollbar{display:none}
.tp-inner{margin:0 auto;padding:40vh 20px 50vh;display:flex;flex-direction:column;align-items:center}
.tp-line{text-align:center;cursor:pointer;padding:2px 0;transition:opacity .2s,transform .18s}
.tp-gap{flex-shrink:0}

/* Control bar — bottom, always visible */
.tp-bar{display:flex;flex-direction:column;background:#0a0a0a;border-top:1px solid #222;flex-shrink:0}
.tp-prog{height:2px;background:#1a1a1a}
.tp-pf{height:100%;background:#444;transition:width .4s}
.tp-ctrls{display:flex;align-items:center;gap:4px;padding:7px 12px;flex-wrap:nowrap;overflow-x:auto}
.tc{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;border:1px solid #2a2a2a;background:transparent;color:#666;cursor:pointer;font-size:13px;flex-shrink:0}
.tc:hover{background:#1a1a1a;color:#ccc}
.tp-play{width:40px;height:40px;border-radius:50%;border:none;background:#fff;color:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.tp-play:hover{background:#e0e0e0}
.sp-d{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0}
.sp-bs{display:flex;gap:2px;align-items:flex-end;height:10px}
.sp-b{width:2px;border-radius:1px}
.sp-l{font-size:9px;color:#555}
.tsep{width:1px;height:16px;background:#222;flex-shrink:0}
.ti{font-size:10px;color:#555;margin-left:auto;white-space:nowrap}
.mic-w{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0}
.mic-b{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid #2a2a2a;background:transparent;font-size:13px;color:#555}
.mic-b.on{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.1);color:#22c55e}
.mic-b.er{border-color:rgba(239,68,68,.4);color:#ef4444}
.mic-l{font-size:8px;font-weight:700;color:#555}
.mic-l.on{color:#22c55e}
.hints{padding:3px 12px 5px;font-size:9px;color:#333;letter-spacing:.04em;text-align:center}

/* Countdown overlay — absolute inside tp-scroll */
.tp-cd-wrap{display:none;position:absolute;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center}
.tp-cd-wrap.show{display:flex}
.tp-main{position:relative;flex:1;overflow:hidden;display:flex;flex-direction:column}
.cd-n{font-size:clamp(60px,15vw,140px);font-weight:800;line-height:1;animation:pop .3s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.cd-s{margin-top:10px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;opacity:.35}

/* Toast */
.toast{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:20;padding:5px 13px;border-radius:100px;background:rgba(0,0,0,.9);border:1px solid rgba(255,160,0,.3);font-size:11px;color:rgba(255,200,0,.9);white-space:nowrap;display:none}
.toast.show{display:block}

/* Overlays */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{width:100%;max-width:500px;max-height:90vh;overflow-y:auto;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:14px;padding:22px;display:flex;flex-direction:column;gap:14px}
.modal h2{font-size:16px;font-weight:700;color:#fff}
.modal p{font-size:12px;color:#555;line-height:1.6}
.mrow{display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.btn{padding:6px 13px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid #333;background:transparent;color:#bbb}
.btn:hover{background:#1a1a1a;color:#fff}
.btn.pri{background:#fff;color:#000;border-color:#fff}
.btn.pri:hover{background:#e8e8e8}
.btn.dan{border-color:rgba(239,68,68,.4);color:#ef4444}
.btn.dan:hover{background:rgba(239,68,68,.1)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.cdots{display:flex;gap:5px;align-items:center}
.cd2{width:7px;height:7px;border-radius:50%;background:#222}
.cd2.done{background:#22c55e}
.cd2.cur{background:#fff}
.cd-lbl{font-size:10px;color:#555;margin-left:5px}
.sent-card{background:#161616;border:1px solid #222;border-radius:9px;padding:14px}
.sent-n{font-size:10px;color:#555;text-align:center;margin-bottom:7px;text-transform:uppercase;letter-spacing:.08em}
.sent-t{font-size:14px;font-weight:600;color:#fff;line-height:1.6;text-align:center;min-height:42px;display:flex;align-items:center;justify-content:center}
.wave{display:flex;align-items:center;justify-content:center;gap:3px;height:26px;margin:5px 0}
.wb{width:3px;border-radius:2px;background:#222;height:4px}
.wave.on .wb{background:#22c55e}
.wave.on .wb:nth-child(1){animation:wv 1.1s ease infinite 0s}
.wave.on .wb:nth-child(2){animation:wv 1.1s ease infinite .15s}
.wave.on .wb:nth-child(3){animation:wv 1.1s ease infinite .07s}
.wave.on .wb:nth-child(4){animation:wv 1.1s ease infinite .22s}
.wave.on .wb:nth-child(5){animation:wv 1.1s ease infinite .04s}
.wave.on .wb:nth-child(6){animation:wv 1.1s ease infinite .18s}
.wave.on .wb:nth-child(7){animation:wv 1.1s ease infinite .11s}
@keyframes wv{0%,100%{height:4px}50%{height:20px}}
.tbox{background:#161616;border:1px solid #222;border-radius:6px;padding:8px 11px;min-height:36px;font-size:12px;color:#777;font-style:italic;line-height:1.5}
.srow{display:flex;align-items:center;gap:7px;margin-top:4px}
.sbar{flex:1;height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.sfill{height:100%;border-radius:2px;transition:width .4s,background .4s}
.sval{font-size:11px;font-weight:600;min-width:28px;text-align:right}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.rc{background:#161616;border:1px solid #222;border-radius:8px;padding:11px}
.rc-l{font-size:10px;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.07em}
.rc-v{font-size:18px;font-weight:700;color:#fff}
.badge{display:inline-flex;font-size:10px;font-weight:600;padding:2px 7px;border-radius:100px;margin-top:3px}
.badge.g{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#22c55e}
.badge.y{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:#f59e0b}
.badge.r{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444}
.pr{display:flex;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid #1a1a1a}
.pr:last-child{border:none}
.pr span:first-child{color:#555}
.pr span:last-child{color:#fff;font-weight:500}
.ni{width:100%;background:#161616;border:1px solid #2a2a2a;border-radius:6px;padding:7px 11px;font-size:13px;color:#fff;outline:none}
.ni:focus{border-color:#444}
.ni::placeholder{color:#444}
.pi{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:#161616;border:1px solid #222;border-radius:7px;gap:9px}
.pi.ap{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.05)}
.pi-i{flex:1;min-width:0}
.pi-n{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-m{font-size:10px;color:#555}
.pi-a{display:flex;gap:4px;flex-shrink:0}
</style>
</head>
<body>

<!-- ══ EDITOR ══ -->
<div id="view-editor">
  <div class="eh">
    <span class="logo">🎬 TelePrompter</span>
    <div class="eh-mid">
      <button class="ebtn" id="cal-btn" onclick="openVM()">● Calibrar voz</button>
      <button class="ebtn start" onclick="openTP()">▶ Iniciar</button>
    </div>
  </div>
  <div class="ebody">
    <div class="sidebar">
      <div class="sh"><span>Roteiros</span><button class="sb-add" onclick="newScript()">+</button></div>
      <div class="slist" id="slist"></div>
      <div class="sfoot" id="sfoot"></div>
    </div>
    <div class="emain">
      <div class="title-wrap"><input class="title-inp" id="titinp" placeholder="Título…" oninput="onTitle()"></div>
      <div class="ta-wrap"><textarea id="ctinp" placeholder="Escreva seu roteiro aqui…&#10;&#10;Cada linha vira uma entrada no teleprompter." oninput="onContent()"></textarea></div>
      <div class="statbar">
        <span class="sdot" id="sdot"></span>
        <span id="sw">0 palavras</span>·<span id="sc2">0 chars</span>·<span id="st2">~0s</span>
        <span id="slbl" style="margin-left:auto">Salvo</span>
      </div>
    </div>
  </div>
</div>

<!-- ══ TELEPROMPTER ══ -->
<div id="view-tp">

  <!-- Config bar — top, always visible, controls work directly on DOM -->
  <div class="tp-cfg">
    <div class="cfg-g">
      <span class="cfg-l">Fonte</span>
      <input type="range" id="r-fs" min="24" max="96" step="2" value="52">
      <span class="cfg-v" id="v-fs">52px</span>
    </div>
    <div class="csep"></div>
    <div class="cfg-g">
      <span class="cfg-l">Espaço</span>
      <input type="range" id="r-lh" min="1.2" max="3.0" step="0.1" value="1.9">
      <span class="cfg-v" id="v-lh">1.9×</span>
    </div>
    <div class="csep"></div>
    <div class="cfg-g">
      <span class="cfg-l">Largura</span>
      <input type="range" id="r-bw" min="40" max="100" step="2" value="72">
      <span class="cfg-v" id="v-bw">72%</span>
    </div>
    <div class="csep"></div>
    <div class="cfg-g">
      <span class="cfg-l">Fundo</span>
      <input type="color" id="r-bg" value="#000000">
    </div>
    <div class="cfg-g">
      <span class="cfg-l">Texto</span>
      <input type="color" id="r-fg" value="#ffffff">
    </div>
    <div class="csep"></div>
    <div class="cfg-g">
      <span class="cfg-l">Foco</span>
      <select class="csel" id="r-foc">
        <option value="0">Todas</option>
        <option value="1">1</option>
        <option value="3">3</option>
        <option value="5">5</option>
      </select>
    </div>
    <div class="csep"></div>
    <div class="cfg-g">
      <span class="cfg-l">Espelhar</span>
      <button class="ctog" id="r-mir">OFF</button>
    </div>
    <div class="csep"></div>
    <div class="cfg-g">
      <span class="cfg-l">Cont.</span>
      <select class="csel" id="r-cd">
        <option value="0">Off</option>
        <option value="3" selected>3s</option>
        <option value="5">5s</option>
      </select>
    </div>
    <div class="csep"></div>
    <div class="cfg-g">
      <span class="cfg-l">Idioma</span>
      <select class="csel" id="r-lang">
        <option value="pt-BR">PT</option>
        <option value="en-US">EN</option>
        <option value="es-ES">ES</option>
      </select>
    </div>
  </div>

  <!-- Main scroll area -->
  <div class="tp-main">
    <div class="tp-scroll" id="tp-scroll">
      <div class="tp-inner" id="tp-inner"></div>
    </div>
    <!-- Countdown overlay inside tp-main -->
    <div class="tp-cd-wrap" id="tp-cd">
      <div class="cd-n" id="cd-n">3</div>
      <div class="cd-s">preparando…</div>
    </div>
    <!-- Toast -->
    <div class="toast" id="tp-toast">◈ Impreciso</div>
  </div>

  <!-- Control bar — bottom, always visible -->
  <div class="tp-bar">
    <div class="tp-prog"><div class="tp-pf" id="tp-pf"></div></div>
    <div class="tp-ctrls">
      <button class="tc" onclick="closeTP()" title="Esc">←</button>
      <button class="tc" onclick="tpRestart()" title="R">↺</button>
      <div class="tsep"></div>
      <button class="tc" onclick="tpSpd(-1)">−</button>
      <div class="sp-d">
        <div class="sp-bs" id="sp-bs"></div>
        <div class="sp-l" id="sp-l">vel.3</div>
      </div>
      <button class="tc" onclick="tpSpd(1)">+</button>
      <div class="tsep"></div>
      <button class="tp-play" id="tp-play" onclick="tpToggle()">▶</button>
      <div class="tsep"></div>
      <div class="mic-w">
        <button class="mic-b" id="mic-b" onclick="micToggle()">🎤</button>
        <span class="mic-l" id="mic-l">VOZ</span>
      </div>
      <div class="tsep"></div>
      <button class="tc" onclick="tpCenter()">⊙</button>
      <button class="tc" onclick="togFS()">⛶</button>
      <span class="ti" id="tp-ti">0%</span>
    </div>
    <div class="hints">Espaço·Play &nbsp;|&nbsp; ↑↓·Vel &nbsp;|&nbsp; ←→·Nav &nbsp;|&nbsp; M·Mic &nbsp;|&nbsp; Esc·Sair</div>
  </div>
</div>

<!-- Overlays -->
<div class="overlay" id="vm-ov">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h2>Perfis de Voz</h2>
      <button class="btn" onclick="closeVM()" style="padding:3px 7px;opacity:.5">✕</button>
    </div>
    <div id="vm-body"></div>
    <div class="mrow" id="vm-foot"></div>
  </div>
</div>

<div class="overlay" id="cal-ov">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
      <h2 id="cal-ti">Calibragem</h2>
      <button class="btn" onclick="closeCal()" style="padding:3px 7px;opacity:.5">✕</button>
    </div>
    <p id="cal-de"></p>
    <div class="cdots">
      <div class="cd2 cur" id="c0"></div><div class="cd2" id="c1"></div>
      <div class="cd2" id="c2"></div><div class="cd2" id="c3"></div>
      <span class="cd-lbl" id="clbl"></span>
    </div>
    <div id="cal-bo"></div>
    <div class="mrow">
      <button class="btn" id="csk" onclick="calSkip()">Pular</button>
      <button class="btn pri" id="cnx" onclick="calNext()">Começar</button>
    </div>
  </div>
</div>

<script>
const K={sc:'tp:sc',aid:'tp:aid',cfg:'tp:cfg',vp:'tp:vp',vpa:'tp:vpa'}
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let scripts=ld(K.sc,[{id:'s1',title:'Roteiro de Exemplo',content:'Bem-vindo ao TelePrompter.\n\nEste é um roteiro de demonstração.\n\nA rolagem por voz detecta o que você está falando e sincroniza em tempo real.\n\nMesmo se você pausar ou improvisar, o sistema se reposiciona.\n\nUse as setas para navegar. Espaço pausa e retoma.\n\nAjuste fonte, cores e velocidade na barra acima.\n\nBoa gravação!',createdAt:Date.now(),updatedAt:Date.now()}])
let aid=ld(K.aid,'s1')
let cfg=ld(K.cfg,{fs:52,lh:1.9,sp:3,bw:72,foc:0,bg:'#000000',fg:'#ffffff',mir:false,cd:3,lang:'pt-BR'})
let profs=ld(K.vp,[])
let apid=ld(K.vpa,null)

const gact=()=>scripts.find(s=>s.id===aid)||scripts[0]
const gprof=()=>profs.find(p=>p.id===apid)||null
const gcal=()=>gprof()||{done:false,ts:1,cn:2,fi:[],wpm:130}
const uid=()=>Date.now()+'-'+Math.random().toString(36).slice(2,7)
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
const saveAll=()=>{sv(K.sc,scripts);sv(K.aid,aid);sv(K.cfg,cfg)}

// tp state
let lines=[],act=0,playing=false,raf=null,lts=null,offs=[],micOn=false

// ── WIRE CONTROLS (called once after DOM ready) ──
function wireControls(){
  // Font size
  document.getElementById('r-fs').addEventListener('input',function(){
    cfg.fs=+this.value
    document.getElementById('v-fs').textContent=this.value+'px'
    document.querySelectorAll('.tp-line').forEach(el=>el.style.fontSize=this.value+'px')
    sv(K.cfg,cfg);setTimeout(rebuildOffs,60)
  })
  // Line height
  document.getElementById('r-lh').addEventListener('input',function(){
    cfg.lh=+this.value
    document.getElementById('v-lh').textContent=(+this.value).toFixed(1)+'×'
    document.querySelectorAll('.tp-line').forEach(el=>el.style.lineHeight=this.value)
    document.querySelectorAll('.tp-gap').forEach(el=>el.style.height=(cfg.fs*+this.value*0.4)+'px')

// ── ACTIVE STYLES ──
function updateActiveStyles(){
  const fg=cfg.fg,foc=+cfg.foc,r=foc>0?Math.floor(foc/2):999
  document.querySelectorAll('.tp-line').forEach(el=>{
    const d=Math.abs(+el.dataset.i-act),a=d===0,inf=d<=r
    el.style.color=fg
    el.style.opacity=a?1:!inf?0:Math.max(0.12,0.55-d*0.12)
    el.style.fontWeight=a?700:400
    el.style.transform=a?'scale(1.03)':'scale(1)'
    el.style.visibility=(!inf&&foc>0)?'hidden':'visible'
  })
}

function updateSpeedDisp(){
  const s=cfg.sp,fg=cfg.fg
  document.getElementById('sp-l').textContent='vel.'+s
  const bs=document.getElementById('sp-bs');bs.innerHTML=''
  for(let i=0;i<10;i++){const b=document.createElement('div');b.className='sp-b';b.style.height=(3+i*0.7)+'px';b.style.background=i<s?fg:'#2a2a2a';bs.appendChild(b)}
}

// ── BUILD LINES ──
function parseLines(c){return c.split('\n').map((t,i)=>({i,t:t.trim(),e:t.trim()===''})) }

function renderLines(){
  const sc=gact();if(!sc)return
  lines=parseLines(sc.content)
  const inner=document.getElementById('tp-inner')
  inner.innerHTML=''
  inner.style.width=cfg.bw+'%'
  inner.style.transform=cfg.mir?'scaleX(-1)':''
  lines.forEach(line=>{
    if(line.e){
      const d=document.createElement('div')
      d.className='tp-gap'
      d.style.height=(cfg.fs*cfg.lh*0.4)+'px'
      inner.appendChild(d)
    } else {
      const p=document.createElement('p')
      p.className='tp-line'
      p.dataset.i=line.i
      p.textContent=line.t
      p.style.fontSize=cfg.fs+'px'
      p.style.lineHeight=cfg.lh
      p.style.color=cfg.fg
      p.addEventListener('click',()=>{scrollToLine(line.i);smReset(line.i)})
      inner.appendChild(p)
    }
  })
  // Apply bg to scroll area
  const scEl=document.getElementById('tp-scroll')
  scEl.style.background=cfg.bg

  act=0
  setTimeout(()=>{rebuildOffs();updateProgress();buildChunks();updateActiveStyles();updateSpeedDisp()},80)
}

function rebuildOffs(){
  offs=[]
  document.querySelectorAll('.tp-line').forEach(el=>{offs[+el.dataset.i]=el.offsetTop+el.offsetHeight/2})
}

function scrollToLine(idx){
  const sc=document.getElementById('tp-scroll'),el=document.querySelector(`.tp-line[data-i="${idx}"]`)
  if(!sc||!el)return
  sc.scrollTo({top:Math.max(0,el.offsetTop-sc.clientHeight*0.38),behavior:'smooth'})
}

function calcAct(){
  const sc=document.getElementById('tp-scroll');if(!sc)return
  const ry=sc.scrollTop+sc.clientHeight*0.38
  let best=act,mn=Infinity
  offs.forEach((t,i)=>{if(t==null)return;const d=Math.abs(t-ry);if(d<mn){mn=d;best=i}})
  if(best!==act){act=best;updateActiveStyles();updateProgress()}
}

function updateProgress(){
  const ne=lines.filter(l=>!l.e),pct=ne.length?act/Math.max(ne.length-1,1):0
  document.getElementById('tp-pf').style.width=(pct*100)+'%'
  document.getElementById('tp-ti').textContent=Math.round(pct*100)+'%·'+(act+1)+'/'+ne.length
}

// ── RAF ──
const spPx=s=>Math.round(28*Math.pow(s,1.35))
function startRaf(){
  lts=null
  const tick=ts=>{
    if(!playing||micOn){raf=null;return}
    const sc=document.getElementById('tp-scroll');if(!sc){raf=null;return}
    if(lts!==null){
      const dt=Math.min(ts-lts,100)/1000,px=spPx(cfg.sp)*dt,mx=sc.scrollHeight-sc.clientHeight
      if(sc.scrollTop>=mx){setPlay(false);return}
      sc.scrollTop=Math.min(sc.scrollTop+px,mx);calcAct()
    }
    lts=ts;raf=requestAnimationFrame(tick)
  }
  raf=requestAnimationFrame(tick)
}
function stopRaf(){if(raf){cancelAnimationFrame(raf);raf=null}lts=null}
function setPlay(v){
  playing=v
  document.getElementById('tp-play').innerHTML=v?'⏸':'▶'
  if(v&&!micOn)startRaf();else stopRaf()
}
function tpToggle(){setPlay(!playing)}
function tpRestart(){stopRaf();playing=false;document.getElementById('tp-play').innerHTML='▶';document.getElementById('tp-scroll').scrollTop=0;act=0;updateActiveStyles();updateProgress();smReset(0)}
function tpCenter(){scrollToLine(act)}
function tpSpd(d){cfg.sp=Math.min(10,Math.max(1,cfg.sp+d));document.getElementById('r-fs') && (document.getElementById('sp-l').textContent='vel.'+cfg.sp);sv(K.cfg,cfg);updateSpeedDisp()}

  if(!cfg.cd||cfg.cd<=0){cb();return}

}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition
let rec=null,mStop=false,rcnt=0,sT=null,rT=null
function micStart(){if(!SR){setMicUI('er');return}mStop=false;micOn=true;rcnt=0;stopRaf();setMicUI('on');startSess()}
function micStop(){mStop=true;micOn=false;clearTimeout(sT);clearTimeout(rT);killRec();setMicUI('off');if(playing)startRaf()}
function micToggle(){micOn?micStop():micStart()}
function killRec(){if(!rec)return;rec.onresult=null;rec.onerror=null;rec.onend=null;rec.onstart=null;try{rec.abort()}catch{}rec=null}
function startSess(){
  if(mStop)return;killRec()
  const r=new SR();r.lang=cfg.lang||'pt-BR';r.continuous=false;r.interimResults=true;r.maxAlternatives=1;rec=r
  r.onstart=()=>{rcnt=0;setMicUI('on');sT=setTimeout(()=>{if(!mStop)killRec()},25000)}
  r.onresult=e=>{const res=e.results[e.results.length-1];procT(res[0].transcript)}
  r.onerror=e=>{if(e.error==='aborted'||e.error==='no-speech')return;if(e.error==='not-allowed'){mStop=true;micOn=false;setMicUI('er');showToast('Permissão negada');return}}
  r.onend=()=>{clearTimeout(sT);if(mStop)return;if(rcnt>=10){micOn=false;setMicUI('er');return}rcnt++;rT=setTimeout(startSess,400)}
  try{r.start()}catch{setMicUI('er');micOn=false}
}
function setMicUI(s){const b=document.getElementById('mic-b'),l=document.getElementById('mic-l');b.className='mic-b'+(s==='on'?' on':s==='er'?' er':'');l.className='mic-l'+(s==='on'?' on':'');l.textContent=s==='on'?'ON':s==='er'?'ERRO':s==='...'?'...':'VOZ'}
let toastT=null
function showToast(m){const el=document.getElementById('tp-toast');el.textContent='◈ '+m;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),4000)}

// ── TEXT MATCHING ──
const FILL=new Set(['então','tipo','assim','né','aí','ahn','hmm','bom','ok','tá','uh','um','like','so','well','right'])
function norm(t){const ex=new Set(gcal().fi||[]);return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w\s]/g,' ').split(/\s+/).filter(w=>w.length>0&&!FILL.has(w)&&!ex.has(w)).join(' ').trim()}
function bigs(t){const w=t.split(' ').filter(Boolean);if(w.length<2)return w;const r=[];for(let i=0;i<w.length-1;i++)r.push(w[i]+' '+w[i+1]);return r}
function dice(a,b){if(!a.size||!b.size)return 0;let n=0;const[sm,lg]=a.size<=b.size?[a,b]:[b,a];for(const x of sm)if(lg.has(x))n++;return(2*n)/(a.size+b.size)}
let chunks=[]
function buildChunks(){chunks=lines.map(l=>{const t=norm(l.t);return{i:l.i,e:l.e,t,bs:new Set(bigs(t)),wc:t.split(' ').filter(Boolean).length}})}
function thr(wc){const sc2=gcal().done?gcal().ts:1,b=wc<=2?0.65:wc<=4?0.42:wc<=6?0.32:0.24;return Math.max(0.12,b*sc2)}
function scC(ts,idx){const c=chunks[idx];if(!c||c.e)return 0;const s1=dice(ts,c.bs);let s2=0;if(idx+1<chunks.length&&!chunks[idx+1].e){const m=new Set([...c.bs,...chunks[idx+1].bs]);s2=dice(ts,m)}return Math.max(s1,s2)}
function findM(tr){
  const ts=new Set(bigs(norm(tr)));if(!ts.size)return{f:false,i:act,s:0}
  const el=chunks.filter(c=>!c.e),ci=Math.max(0,el.findIndex(c=>c.i>=act))
  let best=null
  for(let i=Math.max(0,ci-4);i<=Math.min(el.length-1,ci+12);i++){const s=scC(ts,el[i].i),bo=i>=ci?s*1.15:s;if(!best||bo>best.bo)best={i:el[i].i,s,bo,wc:el[i].wc}}
  if(best&&best.s>=thr(best.wc))return{f:true,i:best.i,s:best.s}
  let gb=null;for(let i=0;i<el.length;i++){const s=scC(ts,el[i].i);if(!gb||s>gb.s)gb={i:el[i].i,s,wc:el[i].wc}}
  if(gb&&gb.s>=thr(gb.wc))return{f:true,i:gb.i,s:gb.s}
  return{f:false,i:act,s:best?.s||0}
}
let sm={c:0,p:0,n:0}
function smReset(i){sm={c:i,p:i,n:0}}
function smooth(m){
  const CN=gcal().done?gcal().cn:2
  if(!m.f)return sm.c;const cd=m.i;if(cd<sm.c-3)return sm.c
  if(m.s>=0.72){sm={c:cd,p:cd,n:0};return cd}
  if(cd===sm.p){sm.n++;if(sm.n>=CN){sm={c:cd,p:cd,n:0};return cd}return sm.c}
  sm={c:sm.c,p:cd,n:1};return sm.c
}
function procT(tr){
  if(!micOn)return
  const m=findM(tr)
  if(m.s>0&&m.s<0.28)showToast('Impreciso ('+Math.round(m.s*100)+'%)')
  const a=smooth(m)
  if(m.f&&a!==act){act=a;updateActiveStyles();updateProgress();scrollToLine(a)}
}

    document.getElementById('cal-bo').innerHTML=nn+`<div style="background:#161616;border:1px solid #222;border-radius:7px;padding:11px"><p style="font-size:11px;color:#555;line-height:1.65">✓ Fale em ritmo normal<br>✓ Ambiente silencioso é melhor<br>✓ Microfone abre automaticamente</p></div>`
  } else if(s>=1&&s<=4){

    document.getElementById('cnx').textContent=s<4?'Próxima →':'Ver resultado'
    document.getElementById('cnx').disabled=true
    document.getElementById('cal-bo').innerHTML=`<div class="sent-card"><div class="sent-n">Frase ${s} de 4</div><div class="sent-t">${esc(sent)}</div></div><div class="wave on" id="cw">${Array(7).fill('<div class="wb"></div>').join('')}</div><div class="tbox" id="ctb"><span style="opacity:.3">Ouvindo…</span></div><div class="srow" id="csr" style="display:none"><span style="font-size:11px;color:#555;min-width:70px">Similaridade</span><div class="sbar"><div class="sfill" id="csf" style="width:0%"></div></div><span class="sval" id="csv">0%</span></div>`
    cs.ts[idx]=Date.now();setTimeout(()=>calListen(sent,idx),200)
  } else {
    stopCalR()
    const sc2=cs.scores.filter(x=>x!=null),avg=sc2.length?sc2.reduce((a,b)=>a+b,0)/sc2.length:0
    let tw=0,tt=0;const sents=getSents()
    cs.ts.forEach((t,i)=>{if(cs.scores[i]!=null&&cs.ts[i+1]){tw+=sents[i].split(' ').length;tt+=(cs.ts[i+1]-t)/1000}})
    const wpm=tt>0?Math.round(tw/(tt/60)):130
    let ts2=1,cn=2;if(avg>0.7){ts2=1;cn=2}else if(avg>0.55){ts2=.75;cn=2}else if(avg>0.4){ts2=.55;cn=1}else if(avg>0.25){ts2=.4;cn=1}else{ts2=.3;cn=1}
    const ss=wpm<100?2:wpm<130?3:wpm<160?4:wpm<200?5:6
    const q=avg>=0.65?{l:'Excelente',c:'g'}:avg>=0.45?{l:'Boa',c:'y'}:{l:'Fraca',c:'r'}
    const pn=cs.name.trim()||('Perfil '+(profs.length+1))
    const pd={id:cs.pid==='new'?uid():cs.pid,name:pn,done:true,accuracy:Math.round(avg*100)/100,wpm,ts:ts2,cn,fi:[...cs.fi],lang:cfg.lang,createdAt:Date.now()}
    if(cs.pid==='new')profs.push(pd);else profs=profs.map(p=>p.id===cs.pid?{...p,...pd,id:p.id}:p)
    apid=pd.id;sv(K.vp,profs);sv(K.vpa,apid);updCalBadge()
    cfg.sp=ss;sv(K.cfg,cfg)
    document.getElementById('cal-ti').textContent='Concluído'
    document.getElementById('cal-de').textContent=`Perfil "${pn}" salvo.`
    document.getElementById('clbl').textContent='Feito'
    document.getElementById('csk').style.display='none'
    document.getElementById('cnx').textContent='Fechar';document.getElementById('cnx').disabled=false
    document.getElementById('cal-bo').innerHTML=`<div class="rg"><div class="rc"><div class="rc-l">Precisão</div><div class="rc-v">${Math.round(avg*100)}%</div><span class="badge ${q.c}">${q.l}</span></div><div class="rc"><div class="rc-l">Velocidade</div><div class="rc-v">${wpm}</div><div style="font-size:10px;color:#555;margin-top:2px">palavras/min</div></div></div><div style="background:#161616;border:1px solid #222;border-radius:7px;padding:11px;margin-top:7px"><div class="pr"><span>Threshold</span><span>${Math.round(0.24*ts2*100)}%</span></div><div class="pr"><span>Confirmações</span><span>${cn}</span></div><div class="pr"><span>Vel. sugerida</span><span>${ss}</span></div></div>`
  }
}
function calNext(){if(cs.step===0){if(cs.pid==='new'){const el=document.getElementById('cal-ni');if(el)cs.name=el.value.trim()}cs.step=1;renderCal();return}if(cs.step>=1&&cs.step<=4){stopCalR();cs.step++;if(cs.step>4)cs.step=5;document.getElementById('cnx').disabled=false;renderCal();return}closeCal()}
function calSkip(){if(cs.step===0){closeCal();return}stopCalR();cs.scores[cs.step-1]=null;cs.step++;if(cs.step>4)cs.step=5;document.getElementById('cnx').disabled=false;renderCal()}
function stopCalR(){if(cs.rec){try{cs.rec.abort()}catch{}cs.rec.onresult=null;cs.rec.onerror=null;cs.rec.onend=null;cs.rec=null}cs.li=false}
function calListen(sent,idx){
  const SR2=window.SpeechRecognition||window.webkitSpeechRecognition
  if(!SR2){document.getElementById('ctb').innerHTML='<span style="color:#ef4444">Não suportado.</span>';document.getElementById('cnx').disabled=false;return}
  stopCalR()
  const r=new SR2();r.lang=cfg.lang;r.continuous=false;r.interimResults=true;r.maxAlternatives=1;cs.rec=r;cs.li=true
  const tn=norm(sent),ts2=new Set(bigs(tn));let best=0,ft=''
  r.onresult=e=>{
    const res=e.results[e.results.length-1],t=res[0].transcript,fin=res.isFinal
    if(fin){ft=t;cs.ts[idx+1]=Date.now();const tw=norm(t).split(' ').filter(Boolean),tgt=new Set(tn.split(' ').filter(Boolean));tw.forEach(w=>{if(!tgt.has(w)&&w.length>1&&!FILL.has(w)&&!cs.fi.includes(w))cs.fi.push(w)})}
    const sc3=dice(ts2,new Set(bigs(norm(t))));if(sc3>best)best=sc3
    const box=document.getElementById('ctb');if(box)box.innerHTML=fin?`<span style="color:#fff">${esc(t)}</span>`:`<span style="color:#fff">${esc(ft)} </span><span style="color:#555">${esc(t)}</span>`
    if(sc3>0||fin){const pct=Math.round(best*100),col=pct>=60?'#22c55e':pct>=35?'#f59e0b':'#ef4444';const sr=document.getElementById('csr');if(sr)sr.style.display='flex';const sf=document.getElementById('csf');if(sf){sf.style.width=pct+'%';sf.style.background=col}const sv2=document.getElementById('csv');if(sv2){sv2.textContent=pct+'%';sv2.style.color=col}}
    if(fin){cs.scores[idx]=best;cs.li=false;const w=document.getElementById('cw');if(w)w.classList.remove('on');document.getElementById('cnx').disabled=false}
  }
  r.onerror=e=>{if(e.error==='aborted')return;const b=document.getElementById('ctb');if(b)b.innerHTML=`<span style="color:#ef4444">Erro: ${e.error}</span>`;document.getElementById('cnx').disabled=false}
  r.onend=()=>{const w=document.getElementById('cw');if(w)w.classList.remove('on');if(cs.li&&best===0)document.getElementById('cnx').disabled=false}
  try{r.start()}catch{document.getElementById('cnx').disabled=false}
}

// ── INIT ──
wireControls()
renderSB()
loadAct()
updStat()
updCalBadge()
</script>
