<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TelePrompter</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--green:#22c55e;--amber:#f59e0b;--red:#ef4444}
html,body{height:100%;overflow:hidden}
body{background:#111;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.screen{position:fixed;inset:0;display:flex;flex-direction:column}
.screen.hidden{display:none}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;gap:0;background:#0d0d0d;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;flex-wrap:wrap}
.hdr-logo{display:flex;align-items:center;gap:8px;padding:0 16px;height:48px;font-size:14px;font-weight:700;color:#fff;border-right:1px solid rgba(255,255,255,.08);white-space:nowrap;flex-shrink:0}
.logo-mark{width:24px;height:24px;border:1.5px solid rgba(255,255,255,.5);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px}
.logo-mark span{display:block;height:1.5px;background:#fff;border-radius:1px}
.logo-mark span:nth-child(1){width:11px}
.logo-mark span:nth-child(2){width:7px;opacity:.5}
.logo-mark span:nth-child(3){width:9px;opacity:.25}

/* Controls row */
.ctrl-row{display:flex;align-items:center;gap:12px;padding:0 14px;height:48px;flex:1;flex-wrap:wrap;overflow:hidden}
.ctrl-grp{display:flex;align-items:center;gap:6px}
.ctrl-lbl{font-size:11px;color:rgba(255,255,255,.4);white-space:nowrap}
.ctrl-val{font-size:11px;color:#fff;min-width:28px;text-align:right;white-space:nowrap}
input[type=range]{width:70px;accent-color:#fff;cursor:pointer}
input[type=color]{width:30px;height:22px;border:1px solid rgba(255,255,255,.2);border-radius:4px;cursor:pointer;padding:1px;background:transparent}
select{background:#1a1a1a;border:1px solid rgba(255,255,255,.12);color:#fff;font-size:11px;padding:3px 6px;border-radius:5px;cursor:pointer;outline:none}
.sep{width:1px;height:20px;background:rgba(255,255,255,.1);flex-shrink:0}
.toggle-btn{font-size:11px;padding:3px 9px;border-radius:5px;cursor:pointer;border:1px solid rgba(255,255,255,.18);background:transparent;color:rgba(255,255,255,.45);white-space:nowrap}
.toggle-btn.on{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)}

.hdr-right{display:flex;align-items:center;gap:8px;padding:0 12px;height:48px;border-left:1px solid rgba(255,255,255,.08);flex-shrink:0}
.cal-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.45);cursor:pointer;background:transparent;white-space:nowrap}
.cal-btn:hover{border-color:rgba(255,255,255,.3);color:#fff}
.cal-btn.ok{border-color:rgba(34,197,94,.35);color:var(--green);background:rgba(34,197,94,.08)}
.cal-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.start-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:#fff;color:#000}
.start-btn:hover{background:rgba(255,255,255,.88)}

/* ── EDITOR BODY ── */
.editor-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:210px;min-width:210px;border-right:1px solid rgba(255,255,255,.08);background:#0a0a0a;display:flex;flex-direction:column}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.07)}
.sb-head span{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.sb-btn{background:none;border:1px solid rgba(255,255,255,.15);color:#fff;width:22px;height:22px;border-radius:5px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
.sb-btn:hover{background:rgba(255,255,255,.08)}
.script-list{flex:1;overflow-y:auto;padding:3px 0}
.si{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;border-left:2px solid transparent;gap:6px}
.si:hover{background:rgba(255,255,255,.04)}
.si.active{border-left-color:#fff;background:rgba(255,255,255,.05)}
.si-title{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#bbb}
.si.active .si-title{color:#fff}
.si-del{opacity:0;font-size:12px;color:rgba(255,255,255,.35);background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:3px}
.si:hover .si-del{opacity:1}
.si-del:hover{color:#ef4444}
.sb-foot{padding:8px 12px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.3)}
.editor-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.title-wrap{padding:12px 20px 0;flex-shrink:0}
.title-inp{width:100%;background:transparent;border:none;outline:none;font-size:20px;font-weight:700;color:#fff;padding:4px 0}
.title-inp::placeholder{color:rgba(255,255,255,.18)}
.ta-wrap{flex:1;padding:8px 20px 0;overflow:hidden;display:flex}
textarea{flex:1;width:100%;background:transparent;border:none;outline:none;resize:none;font-size:15px;line-height:1.75;color:#ccc;font-family:inherit}
textarea::placeholder{color:rgba(255,255,255,.15)}
.stat-bar{display:flex;align-items:center;gap:12px;padding:7px 20px;border-top:1px solid rgba(255,255,255,.07);font-size:11px;color:rgba(255,255,255,.35)}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.save-dot.saving{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;padding:20px}
.overlay.hidden{display:none}
.modal{width:100%;max-width:540px;max-height:90vh;overflow-y:auto;background:#0d0d0d;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:26px;display:flex;flex-direction:column;gap:18px}
.modal h2{font-size:18px;font-weight:700;color:#fff}
.modal p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.65}
.modal-row{display:flex;gap:8px;justify-content:flex-end}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.18);background:transparent;color:#fff}
.btn:hover{background:rgba(255,255,255,.08)}
.btn.primary{background:#fff;color:#000;border-color:#fff}
.btn.primary:hover{background:rgba(255,255,255,.88)}
.btn.danger{border-color:rgba(239,68,68,.4);color:#ef4444}
.btn.danger:hover{background:rgba(239,68,68,.1)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.cdots{display:flex;gap:5px;align-items:center}
.cdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15)}
.cdot.done{background:var(--green)}
.cdot.active{background:#fff}
.cdot-lbl{font-size:11px;color:rgba(255,255,255,.35);margin-left:6px}
.sent-card{background:#161616;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:18px}
.sent-num{font-size:10px;color:rgba(255,255,255,.35);text-align:center;margin-bottom:8px;text-transform:uppercase;letter-spacing:.1em}
.sent-txt{font-size:16px;font-weight:600;color:#fff;line-height:1.6;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center}
.wave{display:flex;align-items:center;justify-content:center;gap:3px;height:32px;margin:6px 0}
.wb{width:3px;border-radius:2px;background:rgba(255,255,255,.15);height:4px}
.wave.on .wb{background:var(--green)}
.wave.on .wb:nth-child(1){animation:wv 1.1s ease infinite 0s}
.wave.on .wb:nth-child(2){animation:wv 1.1s ease infinite .15s}
.wave.on .wb:nth-child(3){animation:wv 1.1s ease infinite .07s}
.wave.on .wb:nth-child(4){animation:wv 1.1s ease infinite .22s}
.wave.on .wb:nth-child(5){animation:wv 1.1s ease infinite .04s}
.wave.on .wb:nth-child(6){animation:wv 1.1s ease infinite .18s}
.wave.on .wb:nth-child(7){animation:wv 1.1s ease infinite .11s}
@keyframes wv{0%,100%{height:4px}50%{height:24px}}
.tbox{background:#1a1a1a;border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:9px 12px;min-height:40px;font-size:13px;color:rgba(255,255,255,.65);line-height:1.5;font-style:italic}
.srow{display:flex;align-items:center;gap:8px;margin-top:4px}
.sbar{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.sfill{height:100%;border-radius:3px;transition:width .4s,background .4s}
.sval{font-size:12px;font-weight:600;min-width:32px;text-align:right}
.rg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rc{background:#161616;border:1px solid rgba(255,255,255,.07);border-radius:9px;padding:12px}
.rc-lbl{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
.rc-val{font-size:20px;font-weight:700;color:#fff}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 8px;border-radius:100px;margin-top:4px}
.badge.good{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.badge.ok{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--amber)}
.badge.bad{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.pr{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.pr:last-child{border:none}
.pr span:first-child{color:rgba(255,255,255,.4)}
.pr span:last-child{color:#fff;font-weight:500}
.ni{width:100%;background:#1a1a1a;border:1px solid rgba(255,255,255,.15);border-radius:7px;padding:8px 12px;font-size:13px;color:#fff;outline:none}
.ni:focus{border-color:rgba(255,255,255,.4)}
.ni::placeholder{color:rgba(255,255,255,.2)}
.pi{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#161616;border:1px solid rgba(255,255,255,.07);border-radius:8px;gap:10px}
.pi.ap{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.06)}
.pi-info{flex:1;min-width:0}
.pi-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pi-meta{font-size:11px;color:rgba(255,255,255,.35)}
.pi-acts{display:flex;gap:5px;flex-shrink:0}

/* ── TELEPROMPTER ── */
#tp{cursor:none;overflow:hidden}
#tp.cv{cursor:default}
.tp-scroll{position:absolute;inset:0;overflow-y:scroll;scrollbar-width:none}
.tp-scroll::-webkit-scrollbar{display:none}
.tp-content{padding:45vh 0;display:flex;flex-direction:column;align-items:center}
.tp-line{text-align:center;cursor:pointer;transition:opacity .25s,transform .2s;padding:2px 0}
.tp-spacer{flex-shrink:0}
.tp-guide{position:fixed;left:0;right:0;height:1px;pointer-events:none;z-index:5}
.tp-rail{position:fixed;right:0;top:0;bottom:0;width:3px;z-index:5;pointer-events:none}
.tp-rail-bg{position:absolute;inset:0}
.tp-rail-fill{position:absolute;top:0;left:0;right:0;transition:height .3s}
.tp-rail-marker{position:absolute;left:0;right:0;height:3px;transition:top .3s}
.tp-fade-top,.tp-fade-bot{position:fixed;left:0;right:0;height:110px;pointer-events:none;z-index:4}
.tp-fade-top{top:0}
.tp-fade-bot{bottom:0}
.tp-cd{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tp-cd.hidden{display:none}
.cd-n{font-size:clamp(80px,20vw,180px);font-weight:800;line-height:1;animation:pop .35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.cd-sub{margin-top:14px;font-size:12px;letter-spacing:.25em;text-transform:uppercase;opacity:.4}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:40;padding:7px 14px;border-radius:100px;background:rgba(0,0,0,.9);border:1px solid rgba(255,160,0,.3);font-size:12px;color:rgba(255,200,0,.9);white-space:nowrap;backdrop-filter:blur(8px)}
.toast.hidden{display:none}
/* control bar */
.tp-bar{position:fixed;bottom:0;left:0;right:0;z-index:20;transition:opacity .4s,transform .4s}
.tp-bar.hidden{opacity:0;pointer-events:none;transform:translateY(6px)}
.tp-prog-wrap{height:1px}
.tp-prog-fill{height:100%;transition:width .5s}
.tp-ctrls{display:flex;align-items:center;gap:5px;padding:8px 14px 10px;backdrop-filter:blur(12px);border-top:1px solid rgba(255,255,255,.07);flex-wrap:nowrap;overflow-x:auto}
.tc{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;font-size:14px;flex-shrink:0}
.tc:hover{background:rgba(255,255,255,.08);color:#fff}
.tp-play{width:44px;height:44px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.tp-play:hover{opacity:.85}
.sp-disp{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0}
.sp-bars{display:flex;gap:2px;align-items:flex-end;height:11px}
.sp-b{width:3px;border-radius:1px}
.sp-lbl{font-size:9px;color:rgba(255,255,255,.35)}
.tsep{width:1px;height:18px;background:rgba(255,255,255,.1);flex-shrink:0}
.tc-info{font-size:10px;color:rgba(255,255,255,.35);margin-left:auto;white-space:nowrap}
.mic-w{display:flex;flex-direction:column;align-items:center;gap:1px;position:relative;flex-shrink:0}
.mic-b{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:transparent;font-size:14px;color:rgba(255,255,255,.4)}
.mic-b.on{border-color:rgba(34,197,94,.45);background:rgba(34,197,94,.1);color:#22c55e;animation:mp 2s ease infinite}
@keyframes mp{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}50%{box-shadow:0 0 0 4px rgba(34,197,94,.15)}}
.mic-b.err{border-color:rgba(239,68,68,.3);color:#ef4444}
.mic-lbl{font-size:9px;font-weight:600;color:rgba(255,255,255,.35)}
.mic-lbl.on{color:#22c55e}
.mic-sc{position:absolute;bottom:-5px;left:0;right:0;height:2px;border-radius:1px;overflow:hidden;background:rgba(255,255,255,.08)}
.mic-sc-f{height:100%;border-radius:1px;transition:width .3s,background .3s}
.tp-hint{position:fixed;bottom:0;left:0;right:0;z-index:19;text-align:center;padding:4px;font-size:10px;letter-spacing:.04em;transition:opacity .4s}
.tp-hint.hidden{opacity:0;pointer-events:none}
</style>
</head>
<body>

<!-- ══ EDITOR ══ -->
<div id="editor" class="screen">
  <div class="hdr">
    <div class="hdr-logo">
      <div class="logo-mark"><span></span><span></span><span></span></div>
      TelePrompter
    </div>

    <div class="ctrl-row">
      <div class="ctrl-grp">
        <span class="ctrl-lbl">Fonte</span>
        <input type="range" id="s-font" min="24" max="96" step="2" value="52" oninput="setSetting('fontSize',+this.value);document.getElementById('sv-font').textContent=this.value+'px'">
        <span class="ctrl-val" id="sv-font">52px</span>
      </div>
      <div class="sep"></div>
      <div class="ctrl-grp">
        <span class="ctrl-lbl">Espaço</span>
        <input type="range" id="s-lh" min="1.2" max="3.0" step="0.1" value="1.9" oninput="setSetting('lineHeight',+this.value);document.getElementById('sv-lh').textContent=(+this.value).toFixed(1)+'×'">
        <span class="ctrl-val" id="sv-lh">1.9×</span>
      </div>
      <div class="sep"></div>
      <div class="ctrl-grp">
        <span class="ctrl-lbl">Largura</span>
        <input type="range" id="s-width" min="40" max="100" step="2" value="72" oninput="setSetting('blockWidth',+this.value);document.getElementById('sv-width').textContent=this.value+'%'">
        <span class="ctrl-val" id="sv-width">72%</span>
      </div>
      <div class="sep"></div>
      <div class="ctrl-grp">
        <span class="ctrl-lbl">Vel.</span>
        <input type="range" id="s-speed" min="1" max="10" step="1" value="3" oninput="setSetting('speed',+this.value);document.getElementById('sv-speed').textContent=this.value">
        <span class="ctrl-val" id="sv-speed">3</span>
      </div>
      <div class="sep"></div>
      <div class="ctrl-grp">
        <span class="ctrl-lbl">Foco</span>
        <select id="s-focus" onchange="setSetting('focusLines',+this.value)">
          <option value="0">Todas</option>
          <option value="3">3</option>
          <option value="5">5</option>
          <option value="7">7</option>
        </select>
      </div>
      <div class="sep"></div>
      <div class="ctrl-grp">
        <span class="ctrl-lbl">Fundo</span>
        <input type="color" id="s-bg" value="#000000" oninput="setSetting('bgColor',this.value)">
      </div>
      <div class="ctrl-grp">
        <span class="ctrl-lbl">Texto</span>
        <input type="color" id="s-fg" value="#ffffff" oninput="setSetting('fgColor',this.value)">
      </div>
      <div class="sep"></div>
      <div class="ctrl-grp">
        <span class="ctrl-lbl">Espelhar</span>
        <button class="toggle-btn" id="s-mirror" onclick="toggleMirror()">OFF</button>
      </div>
      <div class="sep"></div>
      <div class="ctrl-grp">
        <span class="ctrl-lbl">Cont.</span>
        <select id="s-cd" onchange="setSetting('countdown',+this.value)">
          <option value="0">Off</option>
          <option value="3" selected>3s</option>
          <option value="5">5s</option>
        </select>
      </div>
      <div class="sep"></div>
      <div class="ctrl-grp">
        <span class="ctrl-lbl">Idioma</span>
        <select id="s-lang" onchange="setSetting('lang',this.value)">
          <option value="pt-BR">PT-BR</option>
          <option value="en-US">EN-US</option>
          <option value="es-ES">ES</option>
        </select>
      </div>
    </div>

    <div class="hdr-right">
      <button class="cal-btn" id="cal-btn" onclick="openVM()">
        <span class="cal-dot"></span>
        <span id="cal-lbl">Calibrar voz</span>
      </button>
      <button class="start-btn" onclick="openTP()">▶ Iniciar</button>
    </div>
  </div>

  <div class="editor-body">
    <div class="sidebar">
      <div class="sb-head">
        <span>Roteiros</span>
        <button class="sb-btn" onclick="newScript()">+</button>
      </div>
      <div class="script-list" id="script-list"></div>
      <div class="sb-foot" id="sb-foot"></div>
    </div>
    <div class="editor-main">
      <div class="title-wrap"><input class="title-inp" id="title-inp" placeholder="Título do roteiro…" oninput="onTitle()"></div>
      <div class="ta-wrap"><textarea id="content-inp" placeholder="Escreva seu roteiro aqui…&#10;&#10;Cada linha vira uma entrada no teleprompter." oninput="onContent()"></textarea></div>
      <div class="stat-bar">
        <span class="save-dot" id="save-dot"></span>
        <span id="st-words">0 palavras</span>·<span id="st-chars">0 chars</span>·<span id="st-time">~0s</span>
        <span id="save-lbl" style="margin-left:auto">Salvo</span>
      </div>
    </div>
  </div>
</div>

<!-- ══ VOICE MANAGER ══ -->
<div class="overlay hidden" id="vm-overlay">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <h2>Perfis de Voz</h2>
      <button class="btn" onclick="closeVM()" style="padding:4px 8px;opacity:.5;font-size:16px">✕</button>
    </div>
    <div id="vm-body"></div>
    <div class="modal-row" id="vm-foot"></div>
  </div>
</div>

<!-- ══ CALIBRATION ══ -->
<div class="overlay hidden" id="cal-overlay">
  <div class="modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
      <h2 id="cal-title">Calibragem</h2>
      <button class="btn" onclick="closeCal()" style="padding:4px 8px;opacity:.5;font-size:16px">✕</button>
    </div>
    <p id="cal-desc"></p>
    <div class="cdots">
      <div class="cdot active" id="cd0"></div>
      <div class="cdot" id="cd1"></div>
      <div class="cdot" id="cd2"></div>
      <div class="cdot" id="cd3"></div>
      <span class="cdot-lbl" id="cd-lbl"></span>
    </div>
    <div id="cal-body"></div>
    <div class="modal-row">
      <button class="btn" id="cal-skip" onclick="calSkip()">Pular</button>
      <button class="btn primary" id="cal-next" onclick="calNext()">Começar</button>
    </div>
  </div>
</div>

<!-- ══ TELEPROMPTER ══ -->
<div id="tp" class="screen hidden">

<script>
// ── STORAGE ──
const K={sc:'tp:sc',act:'tp:act',cfg:'tp:cfg',vp:'tp:vp',vpa:'tp:vpa'}
const ld=(k,d)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d}}
const sv=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ── DEFAULTS ──
let scripts=ld(K.sc,[{id:'demo',title:'Roteiro de Exemplo',content:'Bem-vindo ao TelePrompter.\n\nEste é um roteiro de demonstração para testar todas as funcionalidades.\n\nA rolagem por voz detecta o que você está falando e sincroniza o texto em tempo real.\n\nMesmo se você pausar, improvisar ou pular um trecho, o sistema se reposiciona.\n\nUse as teclas de seta para navegar. Espaço pausa e retoma.\n\nBoa gravação!',createdAt:Date.now(),updatedAt:Date.now()}])
let activeId=ld(K.act,scripts[0]?.id)
let cfg=ld(K.cfg,{fontSize:52,lineHeight:1.9,speed:3,blockWidth:72,focusLines:0,bgColor:'#000000',fgColor:'#ffffff',mirrored:false,countdown:3,lang:'pt-BR'})
let profiles=ld(K.vp,[])
let activeProfile=ld(K.vpa,null)

const getAct=()=>scripts.find(s=>s.id===activeId)||scripts[0]
const getProf=()=>profiles.find(p=>p.id===activeProfile)||null
const getCal=()=>getProf()||{done:false,thresholdScale:1,confirmNeeded:2,fillers:[],wpm:130}
const uid=()=>Date.now()+'-'+Math.random().toString(36).slice(2,7)
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
const saveAll=()=>{sv(K.sc,scripts);sv(K.act,activeId);sv(K.cfg,cfg)}

function isLight(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>128}
function rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}

// ── SETTINGS ──
// Single function: saves and syncs UI controls
function setSetting(key,val){
  cfg[key]=val
  sv(K.cfg,cfg)
}
function toggleMirror(){
  cfg.mirrored=!cfg.mirrored;sv(K.cfg,cfg)
  document.getElementById('s-mirror').textContent=cfg.mirrored?'ON':'OFF'
  document.getElementById('s-mirror').className='toggle-btn'+(cfg.mirrored?' on':'')
}

function loadCfgToUI(){
  document.getElementById('s-font').value=cfg.fontSize
  document.getElementById('sv-font').textContent=cfg.fontSize+'px'
  document.getElementById('s-lh').value=cfg.lineHeight
  document.getElementById('sv-lh').textContent=(+cfg.lineHeight).toFixed(1)+'×'
  document.getElementById('s-width').value=cfg.blockWidth
  document.getElementById('sv-width').textContent=cfg.blockWidth+'%'
  document.getElementById('s-speed').value=cfg.speed
  document.getElementById('sv-speed').textContent=cfg.speed
  document.getElementById('s-focus').value=cfg.focusLines
  document.getElementById('s-bg').value=cfg.bgColor||'#000000'
  document.getElementById('s-fg').value=cfg.fgColor||'#ffffff'
  document.getElementById('s-mirror').textContent=cfg.mirrored?'ON':'OFF'
  document.getElementById('s-mirror').className='toggle-btn'+(cfg.mirrored?' on':'')
  document.getElementById('s-cd').value=cfg.countdown
  document.getElementById('s-lang').value=cfg.lang||'pt-BR'
}

// ── VOICE MANAGER ──
function openVM(){document.getElementById('vm-overlay').classList.remove('hidden');renderVM()}
function closeVM(){document.getElementById('vm-overlay').classList.add('hidden')}
function renderVM(){
  const body=document.getElementById('vm-body'),foot=document.getElementById('vm-foot')
  if(!profiles.length){body.innerHTML='<div style="text-align:center;padding:24px 0"><div style="font-size:28px;margin-bottom:8px">🎤</div><p>Nenhum perfil ainda.</p></div>'}
  else{
    body.innerHTML='<div style="display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto" id="pl"></div>'
    const pl=document.getElementById('pl')
    profiles.forEach(p=>{
      const isAct=p.id===activeProfile
      const d=document.createElement('div');d.className='pi'+(isAct?' ap':'')
      d.innerHTML=`<div class="pi-info"><div class="pi-name">${esc(p.name)}${isAct?' <span style="font-size:10px;color:var(--green)">● ativo</span>':''}</div><div class="pi-meta">${Math.round(p.accuracy*100)}% · ${p.wpm}wpm · ${p.lang}</div></div><div class="pi-acts">${!isAct?`<button class="btn" style="font-size:11px;padding:4px 8px" onclick="usePro('${p.id}')">Usar</button>`:''}<button class="btn" style="font-size:11px;padding:4px 8px" onclick="recal('${p.id}')">Recalibrar</button><button class="btn danger" style="font-size:11px;padding:4px 8px" onclick="delPro('${p.id}')">✕</button></div>`
      pl.appendChild(d)
    })
  }
  foot.innerHTML='<button class="btn" onclick="closeVM()">Fechar</button><button class="btn primary" onclick="newCal()">+ Nova calibragem</button>'
}
function usePro(id){activeProfile=id;sv(K.vpa,id);updateCalBadge();renderVM()}
function delPro(id){if(!confirm('Excluir?'))return;profiles=profiles.filter(p=>p.id!==id);if(activeProfile===id)activeProfile=profiles[0]?.id||null;sv(K.vp,profiles);sv(K.vpa,activeProfile);updateCalBadge();renderVM()}
function recal(id){const p=profiles.find(x=>x.id===id);if(!p)return;closeVM();startCal(p.name,id)}
function newCal(){closeVM();startCal('','new')}
function updateCalBadge(){const p=getProf();const b=document.getElementById('cal-btn'),l=document.getElementById('cal-lbl');if(p){b.className='cal-btn ok';l.textContent=p.name+' ✓'}else{b.className='cal-btn';l.textContent='Calibrar voz'}}

// ── CALIBRATION ──
const CSENTS={'pt-BR':['A tecnologia está transformando a forma como nos comunicamos.','Cada palavra dita com clareza ajuda o sistema a te acompanhar melhor.','O teleprompter sincroniza automaticamente com a sua voz durante a gravação.','Fale em ritmo natural, como se estivesse apresentando para uma câmera.'],'en-US':['Technology is transforming the way we communicate.','Speaking clearly helps the system follow your voice.','The teleprompter synchronizes with your speech during recording.','Speak at a natural pace, as if presenting to a camera.'],'es-ES':['La tecnología transforma la forma en que nos comunicamos.','Hablar con claridad ayuda al sistema a seguir tu voz.','El teleprompter se sincroniza con tu voz durante la grabación.','Habla a un ritmo natural, como si presentaras ante una cámara.']}
let cs={step:0,pid:'new',name:'',scores:[],ts:[],rec:null,listening:false,fillers:[]}

function startCal(name,pid){cs={step:0,pid,name,scores:[],ts:[],rec:null,listening:false,fillers:[]};document.getElementById('cal-overlay').classList.remove('hidden');renderCal()}
function closeCal(){stopCalRec();document.getElementById('cal-overlay').classList.add('hidden')}
function getSents(){return CSENTS[cfg.lang]||CSENTS['pt-BR']}

function renderCal(){
  const s=cs.step
  ;[0,1,2,3].forEach(i=>{const el=document.getElementById('cd'+i);el.className='cdot'+(i<s?' done':i===Math.min(s,3)?' active':'')})
  if(s===0){
    document.getElementById('cal-title').textContent=cs.pid==='new'?'Nova Calibragem':'Recalibrar'
    document.getElementById('cal-desc').textContent='Leia 4 frases em voz alta para calibrar a sincronização.'
    document.getElementById('cd-lbl').textContent='Pronto para começar'
    document.getElementById('cal-skip').textContent='Cancelar'
    document.getElementById('cal-next').textContent='Começar ▶'
    document.getElementById('cal-next').disabled=false
    const nn=cs.pid==='new'?`<div><label style="font-size:11px;color:rgba(255,255,255,.4);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em">Nome do perfil</label><input class="ni" id="cal-ni" placeholder="Ex: Minha voz, Estúdio…" value="${esc(cs.name)}" maxlength="40" oninput="cs.name=this.value"></div>`:`<div style="background:#161616;border:1px solid rgba(255,255,255,.07);border-radius:7px;padding:10px;font-size:13px;color:rgba(255,255,255,.45)">Recalibrando: <strong style="color:#fff">${esc(cs.name)}</strong></div>`
    document.getElementById('cal-body').innerHTML=nn+`<div style="background:#161616;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px;margin-top:8px"><p style="font-size:12px;color:rgba(255,255,255,.45);line-height:1.7">✓ Fale em ritmo normal<br>✓ Ambiente silencioso é melhor<br>✓ Microfone abre automaticamente</p></div>`
  } else if(s>=1&&s<=4){
    const idx=s-1,sent=getSents()[idx]
    document.getElementById('cal-title').textContent='Leia em voz alta'
    document.getElementById('cal-desc').textContent='Fale a frase abaixo naturalmente.'
    document.getElementById('cd-lbl').textContent=`Frase ${s} de 4`
    document.getElementById('cal-skip').textContent='Pular'
    document.getElementById('cal-next').textContent=s<4?'Próxima →':'Ver resultado'
    document.getElementById('cal-next').disabled=true
    document.getElementById('cal-body').innerHTML=`<div class="sent-card"><div class="sent-num">Frase ${s} de 4</div><div class="sent-txt">${esc(sent)}</div></div><div class="wave on" id="cwave">${Array(7).fill('<div class="wb"></div>').join('')}</div><div class="tbox" id="ctbox"><span style="opacity:.3">Ouvindo…</span></div><div class="srow" id="csrow" style="display:none"><span style="font-size:11px;color:rgba(255,255,255,.4);min-width:75px">Similaridade</span><div class="sbar"><div class="sfill" id="csfill" style="width:0%"></div></div><span class="sval" id="csval">0%</span></div>`
    cs.ts[idx]=Date.now();setTimeout(()=>startCalListen(sent,idx),200)
  } else {
    stopCalRec()
    const scores=cs.scores.filter(x=>x!=null)
    const avg=scores.length?scores.reduce((a,b)=>a+b,0)/scores.length:0
    let tw=0,tt=0;const sents=getSents()
    cs.ts.forEach((t,i)=>{if(cs.scores[i]!=null&&cs.ts[i+1]){tw+=sents[i].split(' ').length;tt+=(cs.ts[i+1]-t)/1000}})
    const wpm=tt>0?Math.round(tw/(tt/60)):130
    let ts=1,cn=2
    if(avg>0.7){ts=1.0;cn=2}else if(avg>0.55){ts=0.75;cn=2}else if(avg>0.4){ts=0.55;cn=1}else if(avg>0.25){ts=0.4;cn=1}else{ts=0.3;cn=1}
    const ss=wpm<100?2:wpm<130?3:wpm<160?4:wpm<200?5:6
    const q=avg>=0.65?{l:'Excelente',c:'good'}:avg>=0.45?{l:'Boa',c:'ok'}:{l:'Fraca',c:'bad'}
    const pname=cs.name.trim()||('Perfil '+(profiles.length+1))
    const pd={id:cs.pid==='new'?uid():cs.pid,name:pname,done:true,accuracy:Math.round(avg*100)/100,wpm,thresholdScale:ts,confirmNeeded:cn,fillers:[...cs.fillers],lang:cfg.lang,createdAt:Date.now()}
    if(cs.pid==='new')profiles.push(pd);else profiles=profiles.map(p=>p.id===cs.pid?{...p,...pd,id:p.id}:p)
    activeProfile=pd.id;sv(K.vp,profiles);sv(K.vpa,activeProfile);updateCalBadge()
    cfg.speed=ss;sv(K.cfg,cfg);document.getElementById('s-speed').value=ss;document.getElementById('sv-speed').textContent=ss
    document.getElementById('cal-title').textContent='Calibragem concluída'
    document.getElementById('cal-desc').textContent=`Perfil "${pname}" salvo.`
    document.getElementById('cd-lbl').textContent='Concluído'
    document.getElementById('cal-skip').style.display='none'
    document.getElementById('cal-next').textContent='Fechar';document.getElementById('cal-next').disabled=false
    document.getElementById('cal-body').innerHTML=`<div class="rg"><div class="rc"><div class="rc-lbl">Precisão</div><div class="rc-val">${Math.round(avg*100)}%</div><div><span class="badge ${q.c}">${q.l}</span></div></div><div class="rc"><div class="rc-lbl">Velocidade</div><div class="rc-val">${wpm}</div><div style="font-size:11px;color:rgba(255,255,255,.35);margin-top:3px">palavras/min</div></div></div><div style="background:#161616;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:12px;margin-top:8px"><div class="pr"><span>Threshold</span><span>${Math.round(0.24*ts*100)}%</span></div><div class="pr"><span>Confirmações</span><span>${cn}</span></div><div class="pr"><span>Vel. sugerida</span><span>${ss}</span></div></div>`
  }
}

function calNext(){
  if(cs.step===0){if(cs.pid==='new'){const el=document.getElementById('cal-ni');if(el)cs.name=el.value.trim()}cs.step=1;renderCal();return}
  if(cs.step>=1&&cs.step<=4){stopCalRec();cs.step++;if(cs.step>4)cs.step=5;document.getElementById('cal-next').disabled=false;renderCal();return}
  closeCal()
}
function calSkip(){if(cs.step===0){closeCal();return}stopCalRec();cs.scores[cs.step-1]=null;cs.step++;if(cs.step>4)cs.step=5;document.getElementById('cal-next').disabled=false;renderCal()}
function stopCalRec(){if(cs.rec){try{cs.rec.abort()}catch{}cs.rec.onresult=null;cs.rec.onerror=null;cs.rec.onend=null;cs.rec=null}cs.listening=false}

const FILLERS=new Set(['então','tipo','assim','né','aí','ahn','hmm','bom','ok','tá','uh','um','like','so','well','right'])
function norm(t){const ex=new Set((getCal().fillers||[]));return t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w\s]/g,' ').split(/\s+/).filter(w=>w.length>0&&!FILLERS.has(w)&&!ex.has(w)).join(' ').trim()}
function bigs(t){const w=t.split(' ').filter(Boolean);if(w.length<2)return w;const r=[];for(let i=0;i<w.length-1;i++)r.push(w[i]+' '+w[i+1]);return r}
function dice(a,b){if(!a.size||!b.size)return 0;let n=0;const[sm,lg]=a.size<=b.size?[a,b]:[b,a];for(const x of sm)if(lg.has(x))n++;return(2*n)/(a.size+b.size)}

function startCalListen(sent,idx){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  if(!SR){document.getElementById('ctbox').innerHTML='<span style="color:var(--red)">Não suportado.</span>';document.getElementById('cal-next').disabled=false;return}
  stopCalRec()
  const r=new SR();r.lang=cfg.lang;r.continuous=false;r.interimResults=true;r.maxAlternatives=1;cs.rec=r;cs.listening=true
  const tn=norm(sent),ts=new Set(bigs(tn));let best=0,ft=''
  r.onresult=e=>{
    const res=e.results[e.results.length-1],t=res[0].transcript,fin=res.isFinal
    if(fin){ft=t;cs.ts[idx+1]=Date.now();const tw=norm(t).split(' ').filter(Boolean),tgt=new Set(tn.split(' ').filter(Boolean));tw.forEach(w=>{if(!tgt.has(w)&&w.length>1&&!FILLERS.has(w)&&!cs.fillers.includes(w))cs.fillers.push(w)})}
    const sc=dice(ts,new Set(bigs(norm(t))));if(sc>best)best=sc
    const box=document.getElementById('ctbox');if(box)box.innerHTML=fin?`<span style="color:#fff">${esc(t)}</span>`:`<span style="color:#fff">${esc(ft)} </span><span style="color:rgba(255,255,255,.35)">${esc(t)}</span>`
    if(sc>0||fin){const pct=Math.round(best*100),col=pct>=60?'var(--green)':pct>=35?'var(--amber)':'var(--red)';const sr=document.getElementById('csrow');if(sr)sr.style.display='flex';const sf=document.getElementById('csfill');if(sf){sf.style.width=pct+'%';sf.style.background=col}const sv2=document.getElementById('csval');if(sv2){sv2.textContent=pct+'%';sv2.style.color=col}}
    if(fin){cs.scores[idx]=best;cs.listening=false;const w=document.getElementById('cwave');if(w)w.classList.remove('on');document.getElementById('cal-next').disabled=false}
  }
  r.onerror=e=>{if(e.error==='aborted')return;const b=document.getElementById('ctbox');if(b)b.innerHTML=`<span style="color:var(--red)">Erro: ${e.error}</span>`;document.getElementById('cal-next').disabled=false}
  r.onend=()=>{const w=document.getElementById('cwave');if(w)w.classList.remove('on');if(cs.listening&&best===0)document.getElementById('cal-next').disabled=false}
  try{r.start()}catch{document.getElementById('cal-next').disabled=false}
}

// ── EDITOR ──
function renderSB(){
  const list=document.getElementById('script-list');list.innerHTML=''
  ;[...scripts].sort((a,b)=>b.updatedAt-a.updatedAt).forEach(sc=>{
    const d=document.createElement('div');d.className='si'+(sc.id===activeId?' active':'')
    d.innerHTML=`<span class="si-title">${esc(sc.title||'Sem título')}</span><button class="si-del" onclick="delScript('${sc.id}',event)">✕</button>`
    d.addEventListener('click',()=>selScript(sc.id));list.appendChild(d)
  })
  document.getElementById('sb-foot').textContent=scripts.length+' roteiro'+(scripts.length!==1?'s':'')
}
function loadAct(){const sc=getAct();if(!sc)return;document.getElementById('title-inp').value=sc.title||'';document.getElementById('content-inp').value=sc.content||'';updateStat()}
function selScript(id){flush();activeId=id;sv(K.act,id);renderSB();loadAct()}
function newScript(){const sc={id:uid(),title:'Novo Roteiro',content:'',createdAt:Date.now(),updatedAt:Date.now()};scripts.push(sc);activeId=sc.id;saveAll();renderSB();loadAct();setTimeout(()=>document.getElementById('title-inp').focus(),50)}
function delScript(id,e){e.stopPropagation();if(scripts.length<=1){alert('Precisa ter ao menos um roteiro.');return}if(!confirm('Excluir?'))return;scripts=scripts.filter(s=>s.id!==id);if(activeId===id)activeId=scripts[0].id;saveAll();renderSB();loadAct()}
let saveT=null
function onContent(){const sc=getAct();if(!sc)return;sc.content=document.getElementById('content-inp').value;sc.updatedAt=Date.now();setSav(true);clearTimeout(saveT);saveT=setTimeout(()=>{saveAll();setSav(false)},600);updateStat()}
function onTitle(){const sc=getAct();if(!sc)return;sc.title=document.getElementById('title-inp').value;sc.updatedAt=Date.now();setSav(true);clearTimeout(saveT);saveT=setTimeout(()=>{saveAll();setSav(false);renderSB()},800)}
function flush(){clearTimeout(saveT);const sc=getAct();if(!sc)return;sc.content=document.getElementById('content-inp').value;sc.title=document.getElementById('title-inp').value;saveAll();setSav(false)}
function setSav(v){document.getElementById('save-dot').className='save-dot'+(v?' saving':'');document.getElementById('save-lbl').textContent=v?'Salvando…':'Salvo'}
function updateStat(){const t=(document.getElementById('content-inp').value||'').trim(),w=t?t.split(/\s+/).length:0,c=(document.getElementById('content-inp').value||'').length,s=Math.ceil(w/2.5);document.getElementById('st-words').textContent=w.toLocaleString('pt-BR')+' palavras';document.getElementById('st-chars').textContent=c.toLocaleString('pt-BR')+' chars';document.getElementById('st-time').textContent='~'+(s>=60?Math.floor(s/60)+'min '+(s%60)+'s':s+'s')}

// ── TELEPROMPTER ──
let tpLines=[],tpAct=0,tpPlay=false,tpRaf=null,tpTs=null,tpOff=[],micOn=false

let barT=null
function showBar(){
  document.getElementById('tp-bar').classList.remove('hidden')
  document.getElementById('tp-hint').classList.remove('hidden')
  document.getElementById('tp').classList.add('cv')
  clearTimeout(barT)
  if(tpPlay&&!micOn){barT=setTimeout(()=>{document.getElementById('tp-bar').classList.add('hidden');document.getElementById('tp-hint').classList.add('hidden');document.getElementById('tp').classList.remove('cv')},3000)}
}

function parseLines(c){return c.split('\n').map((t,i)=>({i,text:t.trim(),empty:t.trim()===''})) }

// Apply all visual styles to the TP based on current cfg
function applyStyles(){
  const bg=cfg.bgColor||'#000000',fg=cfg.fgColor||'#ffffff'
  const lt=isLight(bg)
  const tp=document.getElementById('tp')
  tp.style.background=bg
  tp.style.transform=cfg.mirrored?'scaleX(-1)':''
  document.getElementById('tp-ft').style.background=`linear-gradient(to bottom,${bg},transparent)`
  document.getElementById('tp-fb').style.background=`linear-gradient(to top,${bg},transparent)`
  document.getElementById('tp-rbg').style.background=rgba(fg,0.06)
  document.getElementById('tp-rf').style.background=rgba(fg,0.3)
  document.getElementById('tp-rm').style.background=fg
  document.getElementById('tp-guide').style.background=rgba(fg,0.07)
  const cbg=lt?'rgba(255,255,255,0.94)':'rgba(0,0,0,0.88)'
  const cbdr=lt?'rgba(0,0,0,0.08)':'rgba(255,255,255,0.07)'
  const cm=lt?'rgba(0,0,0,0.45)':'rgba(255,255,255,0.4)'
  const ctrl=document.getElementById('tp-ctrls')
  ctrl.style.background=cbg;ctrl.style.borderTopColor=cbdr
  document.getElementById('tp-pw').style.background=lt?'rgba(0,0,0,0.1)':'rgba(255,255,255,0.1)'
  document.getElementById('tp-pf').style.background=lt?'rgba(0,0,0,0.4)':'rgba(255,255,255,0.5)'
  document.getElementById('tp-hint').style.cssText=`background:${cbg};color:${cm};position:fixed;bottom:0;left:0;right:0;z-index:19;text-align:center;padding:4px;font-size:10px;letter-spacing:.04em;transition:opacity .4s`
  ;['tc-info','sp-lbl'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.color=cm})
  document.querySelectorAll('.tc').forEach(el=>el.style.color=cm)
  const pb=document.getElementById('tp-play')
  pb.style.background=fg;pb.style.color=bg
  // countdown
  document.getElementById('tp-cd').style.background=rgba(bg,0.93)
  document.getElementById('cd-num').style.color=fg
  // content
  const wrap=document.querySelector('.tp-content')
  if(wrap)wrap.style.width=cfg.blockWidth+'%'
  document.querySelectorAll('.tp-line').forEach(el=>{el.style.fontSize=cfg.fontSize+'px';el.style.lineHeight=cfg.lineHeight})
  document.querySelectorAll('.tp-spacer').forEach(el=>{el.style.height=(cfg.fontSize*cfg.lineHeight*0.4)+'px'})
  updateActiveStyles()
  updateSpeedDisp()
  setTimeout(rebuildOff,60)
}

function renderTP(){
  flush();const sc=getAct();if(!sc)return
  tpLines=parseLines(sc.content)
  const scroll=document.getElementById('tp-scroll');scroll.innerHTML=''
  const wrap=document.createElement('div');wrap.className='tp-content';wrap.style.width=cfg.blockWidth+'%';wrap.style.margin='0 auto'
  tpLines.forEach(line=>{
    const el=document.createElement(line.empty?'div':'p')
    el.className=line.empty?'tp-spacer':'tp-line'
    if(!line.empty){el.dataset.idx=line.i;el.textContent=line.text;el.style.fontSize=cfg.fontSize+'px';el.style.lineHeight=cfg.lineHeight;el.addEventListener('click',()=>{goTo(line.i);smReset(line.i)})}
    else{el.style.height=(cfg.fontSize*cfg.lineHeight*0.4)+'px'}
    wrap.appendChild(el)
  })
  scroll.appendChild(wrap)
  tpAct=0;micOn=false;tpPlay=false
  document.getElementById('tp-play').innerHTML='▶'
  applyStyles()
  setTimeout(()=>{rebuildOff();updateProg();buildChunks()},100)
}

function rebuildOff(){tpOff=[];document.querySelectorAll('.tp-line').forEach(el=>{tpOff[+el.dataset.idx]=el.offsetTop+el.offsetHeight/2})}

function updateActiveStyles(){
  const fg=cfg.fgColor||'#ffffff',fr=cfg.focusLines>0?Math.floor(cfg.focusLines/2):999
  document.querySelectorAll('.tp-line').forEach(el=>{
    const dist=Math.abs(+el.dataset.idx-tpAct),act=dist===0,inf=dist<=fr
    el.style.color=fg;el.style.opacity=act?1:!inf?0:Math.max(0.12,0.55-dist*0.12)
    el.style.fontWeight=act?700:400;el.style.transform=act?'scale(1.04)':'scale(1)'
    el.style.visibility=(!inf&&cfg.focusLines>0)?'hidden':'visible'
  })
}

function calcAct(){
  const sc=document.getElementById('tp-scroll');if(!sc)return
  const ry=sc.scrollTop+sc.clientHeight*0.38;let best=tpAct,mn=Infinity
  tpOff.forEach((t,i)=>{if(t==null)return;const d=Math.abs(t-ry);if(d<mn){mn=d;best=i}})
  if(best!==tpAct){tpAct=best;updateActiveStyles();updateProg()}
}

function updateProg(){
  const ne=tpLines.filter(l=>!l.empty),pct=ne.length?tpAct/Math.max(ne.length-1,1):0
  document.getElementById('tp-pf').style.width=(pct*100)+'%'
  document.getElementById('tp-rf').style.height=(pct*100)+'%'
  document.getElementById('tp-rm').style.top=(pct*100)+'%'
  document.getElementById('tc-info').textContent=Math.round(pct*100)+'%·'+(tpAct+1)+'/'+ne.length
}

function spPx(s){return Math.round(28*Math.pow(s,1.35))}

function startRaf(){
  tpTs=null
  const tick=ts=>{
    if(!tpPlay||micOn){tpRaf=null;return}
    const sc=document.getElementById('tp-scroll');if(!sc){tpRaf=null;return}
    if(tpTs!==null){const dt=Math.min(ts-tpTs,100)/1000,px=spPx(cfg.speed)*dt,mx=sc.scrollHeight-sc.clientHeight;if(sc.scrollTop>=mx){play(false);return}sc.scrollTop=Math.min(sc.scrollTop+px,mx);calcAct()}
    tpTs=ts;tpRaf=requestAnimationFrame(tick)
  }
  tpRaf=requestAnimationFrame(tick)
}
function stopRaf(){if(tpRaf){cancelAnimationFrame(tpRaf);tpRaf=null}tpTs=null}

function play(v){
  tpPlay=v;document.getElementById('tp-play').innerHTML=v?'⏸':'▶'
  if(v&&!micOn)startRaf();else stopRaf();showBar()
}
function tpToggle(){play(!tpPlay)}

function tpRestart(){stopRaf();tpPlay=false;document.getElementById('tp-play').innerHTML='▶';document.getElementById('tp-scroll').scrollTop=0;tpAct=0;updateActiveStyles();updateProg();smReset(0);showBar()}

function goTo(idx){
  const sc=document.getElementById('tp-scroll'),el=document.querySelector(`.tp-line[data-idx="${idx}"]`)
  if(!sc||!el)return;sc.scrollTo({top:Math.max(0,el.offsetTop-sc.clientHeight*0.38),behavior:'smooth'})
}
function tpCenter(){goTo(tpAct)}

function tpSpeed(d){cfg.speed=Math.min(10,Math.max(1,cfg.speed+d));sv(K.cfg,cfg);document.getElementById('s-speed').value=cfg.speed;document.getElementById('sv-speed').textContent=cfg.speed;updateSpeedDisp();showBar()}

function updateSpeedDisp(){
  const s=cfg.speed,fg=cfg.fgColor||'#ffffff'
  document.getElementById('sp-lbl').textContent='vel.'+s
  const bars=document.getElementById('sp-bars');bars.innerHTML=''
  for(let i=0;i<10;i++){const b=document.createElement('div');b.className='sp-b';b.style.height=(4+i*0.8)+'px';b.style.background=i<s?fg:rgba(fg,0.12);bars.appendChild(b)}
}

function updateGuide(){document.getElementById('tp-guide').style.top=(document.getElementById('tp').clientHeight*0.38)+'px'}

let cdInt=null
function countdown(cb){
  if(cfg.countdown<=0){cb();return}
  let r=cfg.countdown;const el=document.getElementById('tp-cd'),n=document.getElementById('cd-num')
  el.classList.remove('hidden');n.textContent=r;void n.offsetWidth
  cdInt=setInterval(()=>{r--;if(r<=0){clearInterval(cdInt);cdInt=null;el.classList.add('hidden');cb()}else{n.style.animation='none';void n.offsetWidth;n.style.animation='';n.textContent=r}},1000)
}

function openTP(){
  flush();const sc=getAct()
  if(!sc||!sc.content.trim()){alert('Escreva algo no roteiro antes de iniciar.');return}
  document.getElementById('editor').classList.add('hidden')
  document.getElementById('tp').classList.remove('hidden')
  renderTP();updateGuide();showBar()
  setTimeout(()=>countdown(()=>{}),100)
}

function closeTP(){
  stopRaf();tpPlay=false;micOn=false
  if(cdInt){clearInterval(cdInt);cdInt=null}
  document.getElementById('tp-cd').classList.add('hidden')
  micStop()
  document.getElementById('tp').classList.add('hidden')
  document.getElementById('editor').classList.remove('hidden')
  if(document.fullscreenElement)document.exitFullscreen()
}

function toggleFS(){if(!document.fullscreenElement)document.getElementById('tp').requestFullscreen?.().catch(()=>{});else document.exitFullscreen()}

document.getElementById('tp-scroll').addEventListener('scroll',()=>{if(!tpPlay&&!micOn)calcAct()},{passive:true})
new ResizeObserver(()=>{rebuildOff();updateGuide()}).observe(document.getElementById('tp-scroll'))

// ── SPEECH ──
const SR=window.SpeechRecognition||window.webkitSpeechRecognition
let rec=null,micStop2=false,rcnt=0,sT=null,rT=null
function micStart(){if(!SR){setMic('err');return}micStop2=false;micOn=true;rcnt=0;stopRaf();setMic('on');startSess()}
function micStop(){micStop2=true;micOn=false;clearTimeout(sT);clearTimeout(rT);destroyRec();setMic('off');if(tpPlay)startRaf()}
function micToggle(){micOn?micStop():micStart()}
function destroyRec(){if(!rec)return;rec.onresult=null;rec.onerror=null;rec.onend=null;rec.onstart=null;try{rec.abort()}catch{}rec=null}
function startSess(){
  if(micStop2)return;destroyRec()
  const r=new SR();r.lang=cfg.lang||'pt-BR';r.continuous=false;r.interimResults=true;r.maxAlternatives=1;rec=r
  r.onstart=()=>{rcnt=0;setMic('on');sT=setTimeout(()=>{if(!micStop2)destroyRec()},25000)}
  r.onresult=e=>{const res=e.results[e.results.length-1];procTranscript(res[0].transcript)}
  r.onerror=e=>{if(e.error==='aborted'||e.error==='no-speech')return;if(e.error==='not-allowed'||e.error==='service-not-allowed'){micStop2=true;micOn=false;setMic('err');showToast('Permissão negada');return}}
  r.onend=()=>{clearTimeout(sT);if(micStop2)return;if(rcnt>=10){micOn=false;setMic('err');return}rcnt++;setMic('...');rT=setTimeout(startSess,400)}
  try{r.start()}catch{setMic('err');micOn=false}
}
function setMic(st){
  const b=document.getElementById('mic-b'),l=document.getElementById('mic-lbl')
  b.className='mic-b'
  if(st==='on'){b.classList.add('on');l.className='mic-lbl on';l.textContent='ON'}
  else if(st==='err'){b.classList.add('err');l.className='mic-lbl';l.textContent='ERRO'}
  else if(st==='...'){b.className='mic-b';l.className='mic-lbl';l.textContent='...'}
  else{b.className='mic-b';l.className='mic-lbl';l.textContent='VOZ'}
}

// ── MATCHING ──
let chunks=[]
function buildChunks(){chunks=tpLines.map(l=>{const t=norm(l.text);return{i:l.i,empty:l.empty,t,bs:new Set(bigs(t)),wc:t.split(' ').filter(Boolean).length}})}
function thrsh(wc){const sc=(getCal().done?getCal().thresholdScale:1),b=wc<=2?0.65:wc<=4?0.42:wc<=6?0.32:0.24;return Math.max(0.12,b*sc)}
function scChunk(ts,idx){const c=chunks[idx];if(!c||c.empty)return 0;const s1=dice(ts,c.bs);let s2=0;if(idx+1<chunks.length&&!chunks[idx+1].empty){const m=new Set([...c.bs,...chunks[idx+1].bs]);s2=dice(ts,m)}return Math.max(s1,s2)}
function findMatch(tr){
  const ts=new Set(bigs(norm(tr)));if(!ts.size)return{found:false,i:tpAct,score:0}
  const el=chunks.filter(c=>!c.empty),ci=Math.max(0,el.findIndex(c=>c.i>=tpAct))
  let best=null
  for(let i=Math.max(0,ci-4);i<=Math.min(el.length-1,ci+12);i++){const sc=scChunk(ts,el[i].i),bo=i>=ci?sc*1.15:sc;if(!best||bo>best.bo)best={i:el[i].i,score:sc,bo,wc:el[i].wc}}
  if(best&&best.score>=thrsh(best.wc))return{found:true,i:best.i,score:best.score}
  let gb=null;for(let i=0;i<el.length;i++){const sc=scChunk(ts,el[i].i);if(!gb||sc>gb.score)gb={i:el[i].i,score:sc,wc:el[i].wc}}
  if(gb&&gb.score>=thrsh(gb.wc))return{found:true,i:gb.i,score:gb.score}
  return{found:false,i:tpAct,score:best?.score||0}
}
let sm={c:0,p:0,n:0}
function smReset(i){sm={c:i,p:i,n:0}}
function smooth(match){
  const CN=getCal().done?getCal().confirmNeeded:2
  if(!match.found)return sm.c
  const cd=match.i;if(cd<sm.c-3)return sm.c
  if(match.score>=0.72){sm={c:cd,p:cd,n:0};return cd}
  if(cd===sm.p){sm.n++;if(sm.n>=CN){sm={c:cd,p:cd,n:0};return cd}return sm.c}
  sm={c:sm.c,p:cd,n:1};return sm.c
}
let toastT=null
function showToast(m){const el=document.getElementById('toast');el.textContent='◈ '+m;el.classList.remove('hidden');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.add('hidden'),4000)}
function procTranscript(tr){
  if(!micOn)return
  const m=findMatch(tr),pct=Math.round(m.score*100),f=document.getElementById('mic-sf')
  f.style.width=pct+'%';f.style.background=pct>=60?'#22c55e':pct>=35?'#f59e0b':'#ef4444'
  if(m.score>0&&m.score<0.28)showToast('Impreciso ('+pct+'%)')
  const acc=smooth(m)
  if(m.found&&acc!==tpAct){tpAct=acc;updateActiveStyles();updateProg();goTo(acc)}
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return
  if(!document.getElementById('tp').classList.contains('hidden')){
    switch(e.key){
      case ' ':e.preventDefault();tpToggle();break
      case 'ArrowUp':e.preventDefault();tpSpeed(-1);break
      case 'ArrowDown':e.preventDefault();tpSpeed(1);break
      case 'ArrowLeft':e.preventDefault();skipL(-1);break
      case 'ArrowRight':e.preventDefault();skipL(1);break
      case 'f':case 'F':e.preventDefault();toggleFS();break
      case 'r':case 'R':e.preventDefault();tpRestart();break
      case 'c':case 'C':e.preventDefault();tpCenter();break
      case 'm':case 'M':e.preventDefault();micToggle();break
      case 'Escape':closeTP();break
    }
    showBar()
  }
})
function skipL(d){const ne=tpLines.filter(l=>!l.empty),c=ne.findIndex(l=>l.i===tpAct),n=Math.min(Math.max(0,c+d*3),ne.length-1);goTo(ne[n].i);smReset(ne[n].i)}
document.getElementById('tp').addEventListener('mousemove',showBar)
document.getElementById('tp').addEventListener('touchstart',showBar,{passive:true})

// ── INIT ──
loadCfgToUI()
renderSB()
loadAct()
updateStat()
updateCalBadge()
</script>
