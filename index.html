<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TelePrompter</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--text:#fff;--dim:rgba(255,255,255,0.18);
  --muted:rgba(255,255,255,0.45);--faint:rgba(255,255,255,0.12);
  --border:rgba(255,255,255,0.08);--card:#0d0d0d;--accent:#fff;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
}
html,body{height:100%;overflow:hidden}
body{background:#111;color:#eee;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .2s}
.screen.hidden{opacity:0;pointer-events:none}

/* ── EDITOR ── */
#editor{background:#111}
.editor-header{
  display:flex;align-items:center;justify-content:space-between;
  height:52px;padding:0 16px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  background:#0d0d0d;flex-shrink:0;gap:8px;
}
.editor-logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#fff;white-space:nowrap}
.logo-mark{width:26px;height:26px;border:1.5px solid rgba(255,255,255,0.5);border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:5px}
.logo-mark span{display:block;height:1.5px;background:#fff;border-radius:1px}
.logo-mark span:nth-child(1){width:12px}
.logo-mark span:nth-child(2){width:8px;opacity:.5}
.logo-mark span:nth-child(3){width:10px;opacity:.25}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.18);background:transparent;color:#fff;transition:background .15s,border-color .15s;white-space:nowrap}
.btn:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.3)}
.btn:active{transform:scale(.97)}
.btn.primary{background:#fff;color:#000;border-color:#fff}
.btn.primary:hover{background:rgba(255,255,255,0.88)}
.btn.danger{border-color:rgba(239,68,68,.4);color:#ef4444}
.btn.danger:hover{background:rgba(239,68,68,.1)}
.btn.icon{padding:7px;border-radius:6px}

/* Sidebar */
.editor-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;min-width:220px;border-right:1px solid rgba(255,255,255,0.07);background:#0a0a0a;display:flex;flex-direction:column;transition:width .25s,min-width .25s}
.sidebar.collapsed{width:0;min-width:0;overflow:hidden}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.sidebar-head span{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.script-list{flex:1;overflow-y:auto;padding:4px 0}
.script-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;border-left:2px solid transparent;transition:background .12s,border-color .12s;gap:6px}
.script-item:hover{background:rgba(255,255,255,0.04)}
.script-item.active{border-left-color:#fff;background:rgba(255,255,255,0.05)}
.script-item-title{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:#ddd}
.script-item.active .script-item-title{color:#fff}
.script-item-del{opacity:0;font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;padding:2px 5px;border-radius:4px;flex-shrink:0;line-height:1}
.script-item:hover .script-item-del{opacity:1}
.script-item-del:hover{color:#ef4444;background:rgba(239,68,68,.1)}
.sidebar-foot{padding:10px 12px;border-top:1px solid rgba(255,255,255,0.07);font-size:11px;color:var(--muted)}

/* Main edit area */
.editor-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.title-bar{padding:12px 20px 0;flex-shrink:0}
.title-input{width:100%;background:transparent;border:none;outline:none;font-size:20px;font-weight:700;color:#fff;padding:4px 0}
.title-input::placeholder{color:rgba(255,255,255,0.2)}
.textarea-wrap{flex:1;padding:8px 20px 0;overflow:hidden;display:flex}
textarea{flex:1;width:100%;background:transparent;border:none;outline:none;resize:none;font-size:15px;line-height:1.75;color:#ccc;font-family:inherit}
textarea::placeholder{color:rgba(255,255,255,0.18)}
.status-bar{display:flex;align-items:center;gap:16px;padding:8px 20px;border-top:1px solid rgba(255,255,255,0.07);font-size:12px;color:var(--muted);flex-shrink:0}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.save-dot.saving{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── SETTINGS ROW ── */
.settings-row{display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.07);background:#0d0d0d;flex-shrink:0}
.setting{display:flex;align-items:center;gap:6px}
.setting label{font-size:11px;color:var(--muted);white-space:nowrap}
.setting input[type=range]{width:72px;accent-color:#fff;cursor:pointer}
.setting select{background:#1a1a1a;border:1px solid rgba(255,255,255,0.12);color:#fff;font-size:12px;padding:3px 8px;border-radius:5px;cursor:pointer;outline:none}
.setting-val{font-size:11px;color:#fff;min-width:26px;text-align:right}
.toggle-btn{font-size:11px;padding:4px 10px;border-radius:5px;cursor:pointer;border:1px solid rgba(255,255,255,0.18);background:transparent;color:var(--muted);transition:all .15s}
.toggle-btn.on{background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.3)}

/* ── TELEPROMPTER ── */
#teleprompter{background:#000;cursor:none}
#teleprompter.light{background:#fff}
#teleprompter.hc{background:#000}
#teleprompter.cursor-visible{cursor:default}

.tp-scroll{position:absolute;inset:0;overflow-y:scroll;scrollbar-width:none}
.tp-scroll::-webkit-scrollbar{display:none}
.tp-content{padding:45vh 0;display:flex;flex-direction:column;align-items:center;gap:0}
.tp-line{
  text-align:center;cursor:pointer;
  transition:opacity .25s, transform .2s, color .2s;
  padding:2px 0;
}
.tp-spacer{height:1em}

/* Reading guide */
.tp-guide{position:fixed;left:0;right:0;height:1px;background:rgba(255,255,255,0.07);pointer-events:none;z-index:5;transition:opacity .4s}
#teleprompter.light .tp-guide{background:rgba(0,0,0,0.07)}

/* Progress rail */
.tp-rail{position:fixed;right:0;top:0;bottom:0;width:3px;z-index:5;pointer-events:none}
.tp-rail-bg{position:absolute;inset:0;background:rgba(255,255,255,0.05)}
.tp-rail-fill{position:absolute;top:0;left:0;right:0;background:rgba(255,255,255,0.35);transition:height .3s}
.tp-rail-marker{position:absolute;left:0;right:0;height:3px;background:#fff;transition:top .3s}
#teleprompter.light .tp-rail-bg{background:rgba(0,0,0,0.05)}
#teleprompter.light .tp-rail-fill{background:rgba(0,0,0,0.25)}
#teleprompter.light .tp-rail-marker{background:#000}
#teleprompter.hc .tp-rail-marker{background:#ffe600}
#teleprompter.hc .tp-rail-fill{background:rgba(255,230,0,.3)}

/* Edge faders */
.tp-fade-top,.tp-fade-bot{position:fixed;left:0;right:0;height:120px;pointer-events:none;z-index:4}
.tp-fade-top{top:0;background:linear-gradient(to bottom,#000 0%,transparent 100%)}
.tp-fade-bot{bottom:0;background:linear-gradient(to top,#000 0%,transparent 100%)}
#teleprompter.light .tp-fade-top{background:linear-gradient(to bottom,#fff 0%,transparent 100%)}
#teleprompter.light .tp-fade-bot{background:linear-gradient(to top,#fff 0%,transparent 100%)}
#teleprompter.hc .tp-fade-top{background:linear-gradient(to bottom,#000 0%,transparent 100%)}
#teleprompter.hc .tp-fade-bot{background:linear-gradient(to top,#000 0%,transparent 100%)}

/* Countdown */
.tp-countdown{
  position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,.92);
  transition:opacity .3s;
}
.tp-countdown.hidden{opacity:0;pointer-events:none}
.cd-num{
  font-size:clamp(80px,20vw,180px);font-weight:800;line-height:1;
  animation:cd-pop .35s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes cd-pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.cd-label{margin-top:16px;font-size:13px;letter-spacing:.25em;text-transform:uppercase;opacity:.4}

/* Control bar */
.tp-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  transition:opacity .4s,transform .4s;
}
.tp-bar.hidden{opacity:0;pointer-events:none;transform:translateY(8px)}
.tp-progress{height:1px;background:rgba(255,255,255,0.1)}
.tp-progress-fill{height:100%;background:rgba(255,255,255,.5);transition:width .5s}
.tp-controls{
  display:flex;align-items:center;gap:6px;
  padding:10px 16px 12px;
  background:rgba(0,0,0,.88);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.07);
  flex-wrap:wrap;
}
#teleprompter.light .tp-progress{background:rgba(0,0,0,.1)}
#teleprompter.light .tp-progress-fill{background:rgba(0,0,0,.4)}
#teleprompter.light .tp-controls{background:rgba(255,255,255,.9);border-top-color:rgba(0,0,0,.08)}
#teleprompter.light .tp-controls .btn{color:#000;border-color:rgba(0,0,0,.18)}
#teleprompter.light .tp-controls .btn:hover{background:rgba(0,0,0,.07)}
#teleprompter.light .tp-controls .ctrl-info{color:rgba(0,0,0,.45)}
#teleprompter.hc .tp-controls{background:rgba(0,0,0,.95);border-top-color:rgba(255,230,0,.15)}

.tp-play-btn{
  width:48px;height:48px;border-radius:50%;
  background:#fff;color:#000;border:none;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:18px;transition:opacity .15s,transform .1s;flex-shrink:0;
}
.tp-play-btn:hover{opacity:.88}
.tp-play-btn:active{transform:scale(.94)}
#teleprompter.light .tp-play-btn{background:#000;color:#fff}
#teleprompter.hc .tp-play-btn{background:#ffe600;color:#000}

.speed-display{display:flex;flex-direction:column;align-items:center;gap:2px}
.speed-bars{display:flex;gap:2px;align-items:flex-end;height:12px}
.speed-bar-seg{width:3px;border-radius:1px;transition:background .15s}
.speed-label{font-size:10px;color:var(--muted)}

.ctrl-sep{width:1px;height:20px;background:rgba(255,255,255,.1);margin:0 2px;flex-shrink:0}
#teleprompter.light .ctrl-sep{background:rgba(0,0,0,.1)}
.ctrl-info{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}

/* Mic button */
.mic-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
.mic-btn{
  width:36px;height:36px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:1px solid transparent;
  transition:all .2s;background:transparent;font-size:16px;
}
.mic-btn.idle{border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.4)}
.mic-btn.idle:hover{border-color:rgba(255,255,255,.35);color:rgba(255,255,255,.7)}
.mic-btn.listening{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.1);color:#22c55e}
.mic-btn.error{border-color:rgba(239,68,68,.3);color:#ef4444}
.mic-btn.unsupported{opacity:.3;cursor:not-allowed}
.mic-label{font-size:9px;letter-spacing:.05em;font-weight:600}
.mic-label.on{color:#22c55e}
.mic-label.off{color:var(--muted)}
.mic-score{
  position:absolute;bottom:-6px;left:0;right:0;height:2px;
  border-radius:1px;overflow:hidden;background:rgba(255,255,255,.08)
}
.mic-score-fill{height:100%;border-radius:1px;transition:width .3s,background .3s}

/* Confidence toast */
.conf-toast{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:40;padding:8px 16px;border-radius:100px;
  background:rgba(0,0,0,.9);border:1px solid rgba(255,160,0,.3);
  font-size:12px;color:rgba(255,200,0,.9);
  display:flex;align-items:center;gap:8px;
  transition:opacity .3s;white-space:nowrap;backdrop-filter:blur(8px);
}
.conf-toast.hidden{opacity:0;pointer-events:none}

/* Keyboard hint */
.tp-hint{
  position:fixed;bottom:0;left:0;right:0;z-index:19;
  text-align:center;padding:6px;font-size:10px;color:rgba(255,255,255,.2);
  letter-spacing:.05em;background:rgba(0,0,0,.88);
  transition:opacity .4s;
}
.tp-hint.hidden{opacity:0;pointer-events:none}
#teleprompter.light .tp-hint{background:rgba(255,255,255,.9);color:rgba(0,0,0,.25)}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     TELA 1 — EDITOR
══════════════════════════════════════ -->
<div id="editor" class="screen">

  <div class="editor-header">
    <div class="editor-logo">
      <div class="logo-mark"><span></span><span></span><span></span></div>
      TelePrompter
    </div>

    <!-- Settings inline -->
    <div class="settings-row" style="flex:1;border:none;padding:0 12px;background:transparent">
      <div class="setting">
        <label>Fonte</label>
        <input type="range" id="s-font" min="28" max="88" step="2" value="52">
        <span class="setting-val" id="s-font-v">52</span>
      </div>
      <div class="setting">
        <label>Vel.</label>
        <input type="range" id="s-speed" min="1" max="10" step="1" value="3">
        <span class="setting-val" id="s-speed-v">3</span>
      </div>
      <div class="setting">
        <label>Espaço</label>
        <input type="range" id="s-lh" min="1.2" max="3" step="0.1" value="1.9">
        <span class="setting-val" id="s-lh-v">1.9</span>
      </div>
      <div class="setting">
        <label>Largura</label>
        <input type="range" id="s-width" min="40" max="100" step="2" value="72">
        <span class="setting-val" id="s-width-v">72%</span>
      </div>
      <div class="setting">
        <label>Foco</label>
        <select id="s-focus">
          <option value="0">Todas</option>
          <option value="3">3 linhas</option>
          <option value="5">5 linhas</option>
          <option value="7">7 linhas</option>
        </select>
      </div>
      <div class="setting">
        <label>Tema</label>
        <select id="s-theme">
          <option value="dark">Escuro</option>
          <option value="light">Claro</option>
          <option value="hc">Contraste</option>
        </select>
      </div>
      <div class="setting">
        <label>Espelhar</label>
        <button class="toggle-btn" id="s-mirror">OFF</button>
      </div>
      <div class="setting">
        <label>Contagem</label>
        <select id="s-cd">
          <option value="0">Off</option>
          <option value="3" selected>3s</option>
          <option value="5">5s</option>
        </select>
      </div>
    </div>

    <button class="btn primary" id="btn-open-tp" onclick="openTeleprompter()">
      ▶ Iniciar
    </button>
  </div>

  <div class="editor-body">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <span>Roteiros</span>
        <button class="btn icon" onclick="newScript()" title="Novo roteiro" style="padding:4px 7px;font-size:16px;line-height:1">+</button>
      </div>
      <div class="script-list" id="script-list"></div>
      <div class="sidebar-foot" id="sidebar-foot"></div>
    </div>

    <!-- Edit area -->
    <div class="editor-main">
      <div class="title-bar">
        <input class="title-input" id="title-input" placeholder="Título do roteiro…" oninput="onTitleChange()">
      </div>
      <div class="textarea-wrap">
        <textarea id="content-input" placeholder="Escreva seu roteiro aqui…&#10;&#10;Cada linha ou parágrafo vira uma entrada no teleprompter." oninput="onContentChange()"></textarea>
      </div>
      <div class="status-bar">
        <span class="save-dot" id="save-dot"></span>
        <span id="stat-words">0 palavras</span>
        <span>·</span>
        <span id="stat-chars">0 caracteres</span>
        <span>·</span>
        <span id="stat-time">~0s</span>
        <span id="save-label" style="margin-left:auto">Salvo</span>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     TELA 2 — TELEPROMPTER
══════════════════════════════════════ -->
<div id="teleprompter" class="screen hidden dark">

  <div class="tp-fade-top"></div>
  <div class="tp-fade-bot"></div>

  <div class="tp-guide" id="tp-guide"></div>

  <div class="tp-rail">
    <div class="tp-rail-bg"></div>
    <div class="tp-rail-fill" id="tp-rail-fill"></div>
    <div class="tp-rail-marker" id="tp-rail-marker"></div>
  </div>

  <!-- Scroll container -->
  <div class="tp-scroll" id="tp-scroll"></div>

  <!-- Countdown -->
  <div class="tp-countdown hidden" id="tp-countdown">
    <div class="cd-num" id="cd-num">3</div>
    <div class="cd-label">preparando…</div>
  </div>

  <!-- Confidence toast -->
  <div class="conf-toast hidden" id="conf-toast">
    ◈ Sincronização imprecisa
  </div>

  <!-- Control bar -->
  <div class="tp-bar" id="tp-bar">
    <div class="tp-progress"><div class="tp-progress-fill" id="tp-prog"></div></div>
    <div class="tp-controls">
      <!-- Back to editor -->
      <button class="btn icon" onclick="closeTeleprompter()" title="Voltar (Esc)">←</button>
      <!-- Restart -->
      <button class="btn icon" onclick="tpRestart()" title="Reiniciar (R)">↺</button>

      <div class="ctrl-sep"></div>

      <!-- Speed down -->
      <button class="btn icon" onclick="tpStepSpeed(-1)" title="Menos velocidade (↑)">−</button>
      <div class="speed-display">
        <div class="speed-bars" id="speed-bars"></div>
        <div class="speed-label" id="speed-label">vel. 3</div>
      </div>
      <!-- Speed up -->
      <button class="btn icon" onclick="tpStepSpeed(1)" title="Mais velocidade (↓)">+</button>

      <div class="ctrl-sep"></div>

      <!-- Play/Pause -->
      <button class="tp-play-btn" id="tp-play-btn" onclick="tpToggle()">▶</button>

      <div class="ctrl-sep"></div>

      <!-- Mic -->
      <div class="mic-wrap">
        <button class="mic-btn idle" id="mic-btn" onclick="micToggle()" title="Microfone (M)">🎤</button>
        <span class="mic-label off" id="mic-label">VOZ</span>
        <div class="mic-score"><div class="mic-score-fill" id="mic-score-fill"></div></div>
      </div>

      <div class="ctrl-sep"></div>

      <!-- Recenter -->
      <button class="btn icon" onclick="tpRecenter()" title="Recentralizar (C)">⊙</button>
      <!-- Fullscreen -->
      <button class="btn icon" id="fs-btn" onclick="toggleFullscreen()" title="Tela cheia (F)">⛶</button>

      <span class="ctrl-info" id="ctrl-info">0% · 0/0</span>
    </div>
  </div>

  <div class="tp-hint" id="tp-hint">
    Espaço · Play &nbsp;|&nbsp; ↑↓ · Velocidade &nbsp;|&nbsp; ←→ · Navegar &nbsp;|&nbsp; M · Mic &nbsp;|&nbsp; F · Fullscreen &nbsp;|&nbsp; Esc · Sair
  </div>
</div>

<script>
// ══════════════════════════════════════
// STORAGE
// ══════════════════════════════════════
const KEY_SCRIPTS  = 'tp:scripts'
const KEY_ACTIVE   = 'tp:active'
const KEY_SETTINGS = 'tp:settings'

function load(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch{return def}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let scripts  = load(KEY_SCRIPTS, [{id:'demo',title:'Roteiro de Exemplo',content:'Bem-vindo ao TelePrompter.\n\nEste é um roteiro de demonstração para você testar todas as funcionalidades.\n\nA rolagem automática por voz detecta o que você está falando e sincroniza o texto em tempo real.\n\nMesmo se você pausar, improvisar ou pular um trecho, o sistema se reposiciona automaticamente.\n\nUse as teclas de seta para navegar manualmente. A barra de espaço pausa e retoma.\n\nConfigure fonte, velocidade e espaçamento conforme sua preferência.\n\nAtive o espelhamento se estiver usando um vidro refletor.\n\nBoa gravação!',createdAt:Date.now(),updatedAt:Date.now()}])
let activeId = load(KEY_ACTIVE, scripts[0]?.id)
let settings = load(KEY_SETTINGS, {fontSize:52,lineHeight:1.9,speed:3,blockWidth:72,focusLines:0,theme:'dark',mirrored:false,countdown:3})

function getActive(){return scripts.find(s=>s.id===activeId)||scripts[0]}

function genId(){return Date.now()+'-'+Math.random().toString(36).slice(2,7)}

function persistAll(){
  save(KEY_SCRIPTS,scripts)
  save(KEY_ACTIVE,activeId)
  save(KEY_SETTINGS,settings)
}

// ══════════════════════════════════════
// EDITOR UI
// ══════════════════════════════════════
function renderSidebar(){
  const list=document.getElementById('script-list')
  list.innerHTML=''
  ;[...scripts].sort((a,b)=>b.updatedAt-a.updatedAt).forEach(sc=>{
    const div=document.createElement('div')
    div.className='script-item'+(sc.id===activeId?' active':'')
    div.innerHTML=`<span class="script-item-title">${esc(sc.title||'Sem título')}</span><button class="script-item-del" onclick="deleteScript('${sc.id}',event)" title="Excluir">✕</button>`
    div.addEventListener('click',()=>selectScript(sc.id))
    list.appendChild(div)
  })
  document.getElementById('sidebar-foot').textContent=scripts.length+' roteiro'+(scripts.length!==1?'s':'')
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function loadActiveToEditor(){
  const sc=getActive()
  if(!sc)return
  document.getElementById('title-input').value=sc.title||''
  document.getElementById('content-input').value=sc.content||''
  updateStats()
}

function selectScript(id){
  flushSave()
  activeId=id
  save(KEY_ACTIVE,id)
  renderSidebar()
  loadActiveToEditor()
}

function newScript(){
  const sc={id:genId(),title:'Novo Roteiro',content:'',createdAt:Date.now(),updatedAt:Date.now()}
  scripts.push(sc)
  activeId=sc.id
  persistAll()
  renderSidebar()
  loadActiveToEditor()
  setTimeout(()=>document.getElementById('title-input').focus(),50)
}

function deleteScript(id,e){
  e.stopPropagation()
  if(scripts.length<=1){alert('Precisa ter pelo menos um roteiro.');return}
  if(!confirm('Excluir este roteiro?'))return
  scripts=scripts.filter(s=>s.id!==id)
  if(activeId===id)activeId=scripts[0].id
  persistAll()
  renderSidebar()
  loadActiveToEditor()
}

// Auto-save
let saveTimer=null
function onContentChange(){
  const sc=getActive();if(!sc)return
  sc.content=document.getElementById('content-input').value
  sc.updatedAt=Date.now()
  setSaving(true)
  clearTimeout(saveTimer)
  saveTimer=setTimeout(()=>{persistAll();setSaving(false)},600)
  updateStats()
}

function onTitleChange(){
  const sc=getActive();if(!sc)return
  sc.title=document.getElementById('title-input').value
  sc.updatedAt=Date.now()
  setSaving(true)
  clearTimeout(saveTimer)
  saveTimer=setTimeout(()=>{persistAll();setSaving(false);renderSidebar()},800)
}

function flushSave(){
  clearTimeout(saveTimer)
  const sc=getActive();if(!sc)return
  sc.content=document.getElementById('content-input').value
  sc.title=document.getElementById('title-input').value
  persistAll()
  setSaving(false)
}

function setSaving(v){
  document.getElementById('save-dot').className='save-dot'+(v?' saving':'')
  document.getElementById('save-label').textContent=v?'Salvando…':'Salvo'
}

function updateStats(){
  const txt=(document.getElementById('content-input').value||'').trim()
  const words=txt?txt.split(/\s+/).length:0
  const chars=(document.getElementById('content-input').value||'').length
  const secs=Math.ceil(words/2.5)
  document.getElementById('stat-words').textContent=words.toLocaleString('pt-BR')+' palavras'
  document.getElementById('stat-chars').textContent=chars.toLocaleString('pt-BR')+' chars'
  document.getElementById('stat-time').textContent='~'+(secs>=60?Math.floor(secs/60)+'min '+(secs%60)+'s':secs+'s')
}

// TELEPROMPTER
// ══════════════════════════════════════
let tpLines=[]
let tpActive=0
let tpPlaying=false
let tpRaf=null
let tpLastTs=null
let tpOffsets=[]  // cache de offsetTop

// Controls hide timer
let barTimer=null
function showBar(){
  const bar=document.getElementById('tp-bar')
  const hint=document.getElementById('tp-hint')
  bar.classList.remove('hidden')
  hint.classList.remove('hidden')
  document.getElementById('teleprompter').classList.add('cursor-visible')
  clearTimeout(barTimer)
  if(tpPlaying){
    barTimer=setTimeout(()=>{
      bar.classList.add('hidden')
      hint.classList.add('hidden')
      document.getElementById('teleprompter').classList.remove('cursor-visible')
    },3000)
  }
}

function parseLines(content){
  return content.split('\n').map((t,i)=>({index:i,text:t.trim(),empty:t.trim()===''}))
}

function renderTp(){
  flushSave()
  const sc=getActive();if(!sc)return
  tpLines=parseLines(sc.content)
  const scroll=document.getElementById('tp-scroll')
  scroll.innerHTML=''
  const s=settings

  const wrap=document.createElement('div')
  wrap.className='tp-content'
  wrap.style.width=s.blockWidth+'%'
  wrap.style.margin='0 auto'

  tpLines.forEach(line=>{
    const el=document.createElement(line.empty?'div':'p')
    el.className=line.empty?'tp-spacer':'tp-line'
    if(!line.empty){
      el.dataset.idx=line.index
      el.textContent=line.text
      el.style.fontSize=s.fontSize+'px'
      el.style.lineHeight=s.lineHeight
      el.addEventListener('click',()=>{tpGoTo(line.index);smootherReset(line.index)})
    }
    wrap.appendChild(el)
  })
  scroll.appendChild(wrap)

  // Theme + mirror
  const tp=document.getElementById('teleprompter')
  tp.className='screen dark'  // reset
  if(s.theme==='light') tp.classList.add('light')
  else if(s.theme==='hc') tp.classList.add('hc')
  else tp.classList.add('dark')
  if(s.mirrored) tp.style.transform='scaleX(-1)'
  else tp.style.transform=''

  // Text color
  const isDark=s.theme!=='light'
  const textColor=s.theme==='hc'?'#ffe600':isDark?'#fff':'#000'
  const dimColor=s.theme==='hc'?'rgba(255,230,0,0.2)':isDark?'rgba(255,255,255,0.18)':'rgba(0,0,0,0.18)'
  wrap._textColor=textColor
  wrap._dimColor=dimColor

  tpActive=0
  setTimeout(()=>{rebuildOffsets();updateActiveStyles();updateProgress()},80)
}

function rebuildOffsets(){
  const els=document.querySelectorAll('.tp-line')
  tpOffsets=[]
  els.forEach(el=>{
    const idx=+el.dataset.idx
    tpOffsets[idx]=el.offsetTop+el.offsetHeight/2
  })
}

function getEl(idx){return document.querySelector(`.tp-line[data-idx="${idx}"]`)}

function updateActiveStyles(){
  const s=settings
  const scroll=document.getElementById('tp-scroll')
  const isDark=s.theme!=='light'
  const textColor=s.theme==='hc'?'#ffe600':isDark?'#fff':'#000'
  const dimColor=s.theme==='hc'?'rgba(255,230,0,0.2)':isDark?'rgba(255,255,255,0.18)':'rgba(0,0,0,0.18)'
  const focusR=s.focusLines>0?Math.floor(s.focusLines/2):999

  document.querySelectorAll('.tp-line').forEach(el=>{
    const idx=+el.dataset.idx
    const dist=Math.abs(idx-tpActive)
    const active=dist===0
    const inFocus=dist<=focusR
    const opacity=active?1:!inFocus?0:Math.max(0.12,0.55-dist*0.12)
    el.style.color=textColor
    el.style.opacity=opacity
    el.style.fontWeight=active?700:400
    el.style.transform=active?'scale(1.04)':'scale(1)'
    el.style.visibility=(!inFocus&&s.focusLines>0)?'hidden':'visible'
  })
}

function computeActiveLine(){
  const scroll=document.getElementById('tp-scroll')
  if(!scroll)return
  const readingY=scroll.scrollTop+scroll.clientHeight*0.38
  let best=tpActive,min=Infinity
  tpOffsets.forEach((top,i)=>{
    if(top==null)return
    const d=Math.abs(top-readingY)
    if(d<min){min=d;best=i}
  })
  if(best!==tpActive){tpActive=best;updateActiveStyles();updateProgress()}
}

function updateProgress(){
  const nonEmpty=tpLines.filter(l=>!l.empty)
  const pct=nonEmpty.length>0?tpActive/Math.max(nonEmpty.length-1,1):0
  document.getElementById('tp-prog').style.width=(pct*100)+'%'
  document.getElementById('tp-rail-fill').style.height=(pct*100)+'%'
  document.getElementById('tp-rail-marker').style.top=(pct*100)+'%'
  document.getElementById('ctrl-info').textContent=Math.round(pct*100)+'% · '+(tpActive+1)+'/'+nonEmpty.length
}

// Speed → px/s
function speedToPx(s){return Math.round(28*Math.pow(s,1.35))}

function startRaf(){
  tpLastTs=null
  const tick=ts=>{
    if(!tpPlaying){tpRaf=null;return}
    const scroll=document.getElementById('tp-scroll')
    if(!scroll){tpRaf=null;return}
    if(tpLastTs!==null){
      const dt=Math.min(ts-tpLastTs,100)/1000
      const px=speedToPx(settings.speed)*dt
      const max=scroll.scrollHeight-scroll.clientHeight
      if(scroll.scrollTop>=max){tpPause();return}
      scroll.scrollTop=Math.min(scroll.scrollTop+px,max)
      computeActiveLine()
    }
    tpLastTs=ts
    tpRaf=requestAnimationFrame(tick)
  }
  tpRaf=requestAnimationFrame(tick)
}

function stopRaf(){if(tpRaf){cancelAnimationFrame(tpRaf);tpRaf=null}tpLastTs=null}

function tpPlay(){tpPlaying=true;document.getElementById('tp-play-btn').innerHTML='⏸';startRaf();showBar()}
function tpPause(){tpPlaying=false;document.getElementById('tp-play-btn').innerHTML='▶';stopRaf();showBar()}
function tpToggle(){tpPlaying?tpPause():tpPlay()}

function tpRestart(){
  stopRaf();tpPlaying=false
  document.getElementById('tp-play-btn').innerHTML='▶'
  document.getElementById('tp-scroll').scrollTop=0
  tpActive=0;updateActiveStyles();updateProgress()
  smootherReset(0)
  showBar()
}

function tpGoTo(idx){
  const scroll=document.getElementById('tp-scroll')
  const el=getEl(idx)
  if(!scroll||!el)return
  scroll.scrollTo({top:Math.max(0,el.offsetTop-scroll.clientHeight*0.38),behavior:'smooth'})
}

function tpRecenter(){tpGoTo(tpActive)}

function tpStepSpeed(d){
  settings.speed=Math.min(10,Math.max(1,settings.speed+d))
  save(KEY_SETTINGS,settings)
  updateSpeedDisplay()
  showBar()
}

function updateSpeedDisplay(){
  const s=settings.speed
  document.getElementById('speed-label').textContent='vel. '+s
  const bars=document.getElementById('speed-bars')
  bars.innerHTML=''
  const isDark=document.getElementById('teleprompter').classList.contains('light')?false:true
  const activeCol=document.getElementById('teleprompter').classList.contains('hc')?'#ffe600':'#fff'
  const inactiveCol=document.getElementById('teleprompter').classList.contains('light')?'rgba(0,0,0,0.12)':'rgba(255,255,255,0.12)'
  for(let i=0;i<10;i++){
    const b=document.createElement('div')
    b.className='speed-bar-seg'
    b.style.height=(4+i*0.8)+'px'
    b.style.background=i<s?activeCol:inactiveCol
    bars.appendChild(b)
  }
}

// Reading guide position
function updateGuide(){
  const tp=document.getElementById('teleprompter')
  const guide=document.getElementById('tp-guide')
  guide.style.top=(tp.clientHeight*0.38)+'px'
}

// Countdown
let cdInterval=null
function startCountdown(cb){
  if(settings.countdown<=0){cb();return}
  let rem=settings.countdown
  const el=document.getElementById('tp-countdown')
  const num=document.getElementById('cd-num')
  el.classList.remove('hidden')
  num.textContent=rem
  // Force reflow for animation
  void num.offsetWidth
  cdInterval=setInterval(()=>{
    rem--
    if(rem<=0){
      clearInterval(cdInterval)
      el.classList.add('hidden')
      cb()
    } else {
      num.style.animation='none'
      void num.offsetWidth
      num.style.animation=''
      num.textContent=rem
    }
  },1000)
}

function openTeleprompter(){
  flushSave()
  const sc=getActive()
  if(!sc||!sc.content.trim()){alert('Escreva algo no roteiro antes de iniciar.');return}
  document.getElementById('editor').classList.add('hidden')
  document.getElementById('teleprompter').classList.remove('hidden')
  renderTp()
  updateGuide()
  updateSpeedDisplay()
  showBar()
  tpActive=0
  setTimeout(()=>{
    startCountdown(()=>{tpPlay()})
  },100)
}

function closeTeleprompter(){
  stopRaf()
  tpPlaying=false
  if(cdInterval){clearInterval(cdInterval);cdInterval=null}
  document.getElementById('tp-countdown').classList.add('hidden')
  micStop()
  document.getElementById('teleprompter').classList.add('hidden')
  document.getElementById('editor').classList.remove('hidden')
  if(document.fullscreenElement)document.exitFullscreen()
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.getElementById('teleprompter').requestFullscreen?.().catch(()=>{})
    document.getElementById('fs-btn').textContent='⛶'
  } else {
    document.exitFullscreen()
    document.getElementById('fs-btn').textContent='⛶'
  }
}

// Scroll manual → recalcula linha ativa
document.getElementById('tp-scroll').addEventListener('scroll',()=>{
  if(!tpPlaying)computeActiveLine()
},{passive:true})

// Resize → rebuild offsets
new ResizeObserver(()=>{rebuildOffsets();updateGuide()}).observe(document.getElementById('tp-scroll'))

// KEYBOARD
// ══════════════════════════════════════
document.addEventListener('keydown',e=>{
  const tag=e.target.tagName
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return

  // Teleprompter keys
  if(!document.getElementById('teleprompter').classList.contains('hidden')){
    switch(e.key){
      case ' ':     e.preventDefault();tpToggle();break
      case 'ArrowUp':e.preventDefault();tpStepSpeed(-1);break
      case 'ArrowDown':e.preventDefault();tpStepSpeed(1);break
      case 'ArrowLeft':e.preventDefault();skipLines(-1);break
      case 'ArrowRight':e.preventDefault();skipLines(1);break
      case 'f':case 'F':e.preventDefault();toggleFullscreen();break
      case 'r':case 'R':e.preventDefault();tpRestart();break
      case 'c':case 'C':e.preventDefault();tpRecenter();break
      case 'm':case 'M':e.preventDefault();micToggle();break
      case 'Escape':closeTeleprompter();break
    }
    showBar()
  }
})

function skipLines(dir){
  const nonEmpty=tpLines.filter(l=>!l.empty)
  const cur=nonEmpty.findIndex(l=>l.index===tpActive)
  const next=Math.min(Math.max(0,cur+dir*3),nonEmpty.length-1)
  tpGoTo(nonEmpty[next].index)
  smootherReset(nonEmpty[next].index)
}

// ══════════════════════════════════════
// SPEECH RECOGNITION
// ══════════════════════════════════════
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition
let recognizer=null
let micActive=false
let sessionTimer=null
let restartTimer=null
let micIntentionalStop=false
let reconnectCount=0
const MAX_RECONNECTS=10

function micSupported(){return!!SpeechRecognition}

function micStart(){
  if(!micSupported()){setMicState('unsupported');return}
  micIntentionalStop=false
  micActive=true
  reconnectCount=0
  startSession()
}

function micStop(){
  micIntentionalStop=true
  micActive=false
  clearTimeout(sessionTimer)
  clearTimeout(restartTimer)
  destroyRecognizer()
  setMicState('idle')
}

function micToggle(){micActive?micStop():micStart()}

function destroyRecognizer(){
  if(!recognizer)return
  recognizer.onresult=null;recognizer.onerror=null;recognizer.onend=null;recognizer.onstart=null
  try{recognizer.abort()}catch{}
  recognizer=null
}

function startSession(){
  if(micIntentionalStop)return
  destroyRecognizer()
  recognizer=new SpeechRecognition()
  recognizer.lang=settings.lang||'pt-BR'
  recognizer.continuous=false
  recognizer.interimResults=true
  recognizer.maxAlternatives=1

  recognizer.onstart=()=>{
    reconnectCount=0
    setMicState('listening')
    sessionTimer=setTimeout(()=>{
      if(!micIntentionalStop)destroyRecognizer()
    },25000)
  }

  recognizer.onresult=e=>{
    const r=e.results[e.results.length-1]
    const transcript=r[0].transcript
    const isFinal=r.isFinal
    processTranscript(transcript,isFinal)
  }

  recognizer.onerror=e=>{
    if(e.error==='aborted'||e.error==='no-speech')return
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      micIntentionalStop=true
      setMicState('error')
      showConfToast('Permissão de microfone negada')
      return
    }
  }

  recognizer.onend=()=>{
    clearTimeout(sessionTimer)
    if(micIntentionalStop)return
    if(reconnectCount>=MAX_RECONNECTS){setMicState('error');return}
    reconnectCount++
    setMicState('reconnecting')
    restartTimer=setTimeout(startSession,400)
  }

  try{recognizer.start();setMicState('requesting')}
  catch{setMicState('error')}
}

function setMicState(state){
  const btn=document.getElementById('mic-btn')
  const lbl=document.getElementById('mic-label')
  btn.className='mic-btn'
  if(!micSupported()){btn.classList.add('unsupported');lbl.textContent='SEM SUPORTE';return}
  if(state==='listening'){btn.classList.add('listening');lbl.className='mic-label on';lbl.textContent='ON'}
  else if(state==='error'){btn.classList.add('error');lbl.className='mic-label off';lbl.textContent='ERRO'}
  else if(state==='reconnecting'){btn.classList.add('idle');lbl.className='mic-label off';lbl.textContent='...'}
  else{btn.classList.add('idle');lbl.className='mic-label off';lbl.textContent='VOZ'}
}

// ══════════════════════════════════════
// TEXT MATCHING
// ══════════════════════════════════════
const FILLERS=new Set(['então','tipo','assim','né','aí','ahn','hmm','bom','ok','tá','uh','um','like','so','well','right'])

function normalize(t){
  return t.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^\w\s]/g,' ')
    .split(/\s+/).filter(w=>w.length>0&&!FILLERS.has(w)).join(' ').trim()
}

function bigrams(t){
  const w=t.split(' ').filter(Boolean)
  if(w.length<2)return w
  const r=[]
  for(let i=0;i<w.length-1;i++)r.push(w[i]+' '+w[i+1])
  return r
}

// Pré-computa chunks e bigramSets ao abrir o teleprompter
let tpChunks=[]

function buildChunks(){
  tpChunks=tpLines.map(line=>{
    const text=normalize(line.text)
    return{index:line.index,empty:line.empty,text,bigramSet:new Set(bigrams(text)),wc:text.split(' ').filter(Boolean).length}
  })
}

function diceFromSets(a,b){
  if(!a.size||!b.size)return 0
  let inter=0
  const [small,large]=a.size<=b.size?[a,b]:[b,a]
  for(const bg of small)if(large.has(bg))inter++
  return(2*inter)/(a.size+b.size)
}

function transcriptBigramSet(transcript){
  return new Set(bigrams(normalize(transcript)))
}

function adaptiveThreshold(wc){
  if(wc<=2)return 0.72
  if(wc<=4)return 0.48
  if(wc<=6)return 0.36
  return 0.28
}

function scoreChunk(tSet,idx){
  const c=tpChunks[idx]
  if(!c||c.empty)return 0
  const s1=diceFromSets(tSet,c.bigramSet)
  // Merge com próxima linha
  let s2=0
  if(idx+1<tpChunks.length&&!tpChunks[idx+1].empty){
    const merged=new Set([...c.bigramSet,...tpChunks[idx+1].bigramSet])
    s2=diceFromSets(tSet,merged)
  }
  return Math.max(s1,s2)
}

function findMatch(transcript){
  const tSet=transcriptBigramSet(transcript)
  if(!tSet.size)return{found:false,index:tpActive,score:0}

  const eligible=tpChunks.filter(c=>!c.empty)
  const curEIdx=Math.max(0,eligible.findIndex(c=>c.index>=tpActive))

  const WB=4,WA=12,BIAS=1.15
  const start=Math.max(0,curEIdx-WB),end=Math.min(eligible.length-1,curEIdx+WA)

  let best=null
  for(let i=start;i<=end;i++){
    const score=scoreChunk(tSet,eligible[i].index)
    const boosted=i>=curEIdx?score*BIAS:score
    if(!best||boosted>best.boosted)best={index:eligible[i].index,score,boosted,wc:eligible[i].wc}
  }

  if(best&&best.score>=adaptiveThreshold(best.wc))return{found:true,index:best.index,score:best.score}

  // Global fallback
  let gbest=null
  for(let i=0;i<eligible.length;i++){
    const score=scoreChunk(tSet,eligible[i].index)
    if(!gbest||score>gbest.score)gbest={index:eligible[i].index,score,wc:eligible[i].wc}
  }
  if(gbest&&gbest.score>=adaptiveThreshold(gbest.wc))return{found:true,index:gbest.index,score:gbest.score}

  return{found:false,index:tpActive,score:best?.score||0}
}

// ══════════════════════════════════════
// SMOOTHER
// ══════════════════════════════════════
let smoother={confirmed:0,pending:0,count:0}

function smootherReset(idx){smoother={confirmed:idx,pending:idx,count:0}}

function applySmoothing(match){
  const CONFIRM=2,HIGH=0.72,BACKTRACK=3
  if(!match.found)return smoother.confirmed

  const cand=match.index
  if(cand<smoother.confirmed-BACKTRACK)return smoother.confirmed
  if(match.score>=HIGH){smoother={confirmed:cand,pending:cand,count:0};return cand}

  if(cand===smoother.pending){
    smoother.count++
    if(smoother.count>=CONFIRM){smoother={confirmed:cand,pending:cand,count:0};return cand}
    return smoother.confirmed
  }
  smoother={confirmed:smoother.confirmed,pending:cand,count:1}
  return smoother.confirmed
}

let confToastTimer=null
function updateMicScore(score){
  const fill=document.getElementById('mic-score-fill')
  const pct=Math.round(score*100)
  fill.style.width=pct+'%'
  fill.style.background=pct>=60?'#22c55e':pct>=35?'#f59e0b':'#ef4444'
  if(score>0&&score<0.35)showConfToast('Sincronização imprecisa ('+pct+'%)')
}

function showConfToast(msg){
  const el=document.getElementById('conf-toast')
  el.textContent='◈ '+msg
  el.classList.remove('hidden')
  clearTimeout(confToastTimer)
  confToastTimer=setTimeout(()=>el.classList.add('hidden'),4000)
}

function processTranscript(transcript,isFinal){
  const match=findMatch(transcript)
  updateMicScore(match.score)
  const accepted=applySmoothing(match)
  if(accepted!==tpActive){
    tpActive=accepted
    updateActiveStyles()
    updateProgress()
    tpGoTo(accepted)
  }
}

// INIT
// ══════════════════════════════════════
// Patch renderTp to also build chunks
const _renderTp=renderTp
window.renderTp=function(){_renderTp();setTimeout(buildChunks,150)}

// Mouse move → show bar in TP
document.getElementById('teleprompter').addEventListener('mousemove',showBar)
document.getElementById('teleprompter').addEventListener('touchstart',showBar,{passive:true})

// Initialize
renderSidebar()
loadActiveToEditor()
initSettingsUI()
updateStats()
</script>
